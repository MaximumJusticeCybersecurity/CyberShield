<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CyberShield Trust-Led Conversion Browser Smoke</title>
<style>
body{font-family:Arial,sans-serif;background:#07131f;color:#f7fbff;margin:0;padding:18px}#result{white-space:pre-wrap;padding:14px;border:1px solid #2d4358;border-radius:12px;margin-bottom:14px}iframe{width:100%;height:760px;border:1px solid #2d4358;border-radius:12px;background:white}.pass{color:#77e1a1}.fail{color:#ff7474}
</style>
</head>
<body>
<h1>Trust-Led Conversion Browser Smoke</h1>
<div id="result">RUNNING</div>
<iframe id="appFrame" src="../vendor-risk-next.html"></iframe>
<script>
const result=document.querySelector('#result');
const frame=document.querySelector('#appFrame');
const checks=[];
const wait=ms=>new Promise(resolve=>setTimeout(resolve,ms));
function assert(condition,message){checks.push({pass:Boolean(condition),message});if(!condition)throw new Error(message)}
function heading(doc){return doc.querySelector('#app h1')?.textContent?.trim()||''}
function click(doc,selector){const element=doc.querySelector(selector);assert(element,`Found ${selector}`);element.click()}
async function run(){
  await new Promise((resolve,reject)=>{frame.addEventListener('load',resolve,{once:true});setTimeout(()=>reject(new Error('Initial route load timed out')),10000)});
  await wait(600);
  let doc=frame.contentDocument;
  assert(heading(doc).includes('Would your current process approve this recommendation?'),'Initial screen shows the recommendation challenge');
  assert(!doc.querySelector('#firstName'),'Initial screen does not ask for first name');
  assert(doc.querySelectorAll('[data-judgment]').length===3,'Initial screen offers three judgment choices');
  click(doc,'[data-judgment="more_evidence"]');
  await wait(300);
  doc=frame.contentDocument;
  assert(heading(doc).includes('recommendation sounds stronger than the evidence'),'Judgment advances to the evidence problem');
  assert(doc.querySelector('#contradiction'),'Evidence step exposes contradiction selection');
  click(doc,'#next');
  await wait(250);
  doc=frame.contentDocument;
  assert(heading(doc).includes('Personalize the record'),'Personalization follows initial value');
  assert(doc.querySelector('#firstName')&&doc.querySelector('#company')&&doc.querySelector('#vendor'),'Optional personalization fields are present');
  click(doc,'#next');
  await wait(250);
  doc=frame.contentDocument;
  assert(heading(doc).includes('extracts claims'),'Review step renders claims and validators');
  assert(doc.querySelectorAll('table tbody tr').length>0,'Review step renders material claim rows');
  click(doc,'#next');
  await wait(250);
  doc=frame.contentDocument;
  assert(heading(doc).includes('Compare the candidate actions'),'Decision step renders candidate actions');
  assert(doc.body.textContent.includes('Strongest Action for This Evidence Set'),'Decision copy qualifies the controlled result');
  click(doc,'#next');
  await wait(250);
  doc=frame.contentDocument;
  assert(heading(doc).includes('AI Trust Decision Record is ready'),'Record step renders');
  assert(doc.querySelector('#reviewReal'),'Real-recommendation CTA is present');
  assert(doc.querySelector('#pilot'),'Pilot CTA is present');
  assert(doc.querySelector('#print')&&doc.querySelector('#download'),'Print and JSON actions remain present');
  assert(!doc.body.textContent.includes('Sheet ID source of truth'),'Visible route does not expose the Sheet ID label');
  result.className='pass';
  result.textContent='BROWSER_SMOKE_PASS\n'+checks.map(item=>`PASS: ${item.message}`).join('\n');
  document.title='BROWSER_SMOKE_PASS';
}catch(error){
  result.className='fail';
  result.textContent='BROWSER_SMOKE_FAIL\n'+checks.map(item=>`${item.pass?'PASS':'FAIL'}: ${item.message}`).join('\n')+`\nERROR: ${error.message}`;
  document.title='BROWSER_SMOKE_FAIL';
}
}
run();
</script>
</body>
</html>
