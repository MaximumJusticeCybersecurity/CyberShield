<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>CyberShield Pilot vNext P1 | Internal QA</title>
  <style>
    :root{color-scheme:dark;--navy:#06111f;--card:#0c1c2f;--line:#24425f;--blue:#42a5ff;--text:#edf7ff;--muted:#abc1d4;--good:#4ed99c;--bad:#ff7d7d}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#123458 0,var(--navy) 45%);color:var(--text);font:16px/1.55 system-ui,sans-serif}main{width:min(1180px,94vw);margin:36px auto}.card{margin:18px 0;padding:24px;border:1px solid var(--line);border-radius:18px;background:color-mix(in srgb,var(--card) 94%,transparent);box-shadow:0 18px 50px #0005}.eyebrow{color:var(--blue);font-weight:800;text-transform:uppercase;letter-spacing:.12em}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.metrics div{padding:14px;border:1px solid var(--line);border-radius:12px}.metrics span{display:block;color:var(--muted);font-size:.8rem;text-transform:uppercase}.metrics strong{display:block;margin-top:6px;font-size:1.15rem}.boundary{padding:14px;border-left:4px solid var(--blue);background:#071523}table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left}pre{max-height:680px;overflow:auto;padding:16px;background:#02080e;border-radius:12px;font-size:.78rem}.pass{color:var(--good);font-size:1.4rem;font-weight:900}.fail{color:var(--bad);font-size:1.4rem;font-weight:900}.actions{display:flex;gap:10px;flex-wrap:wrap}button{padding:11px 16px;border:0;border-radius:10px;background:var(--blue);color:#00101f;font-weight:800;cursor:pointer}@media(max-width:760px){.metrics{grid-template-columns:1fr 1fr}table{display:block;overflow:auto}}@media print{body{background:#fff;color:#111}main{width:100%;margin:0}.card{box-shadow:none;border-color:#bbb;break-inside:avoid}pre,.actions{display:none}.boundary{background:#eee}}
  </style>
</head>
<body><main id="app"><p>Loading deterministic Pilot vNext record…</p></main><script type="module" src="src/vnext/pilot-vnext-qa.js"></script></body>
</html>
