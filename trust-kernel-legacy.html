<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Loading CyberShield Trust Kernel Legacy</title>
<link rel="icon" href="assets/mjc-logo-2026.png">
<style>
:root{--bg:#07131f;--panel:#101d29;--line:#2d4358;--text:#f7fbff;--muted:#b9c7d6;--blue:#42d7ff;--amber:#ffd166;--shadow:0 18px 46px rgba(0,0,0,.38)}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#06111c,#07131f);color:var(--text);font-family:Aptos,Calibri,Arial,sans-serif;line-height:1.5}.wrap{width:min(900px,calc(100vw - 30px));margin:0 auto;padding:40px 0}.card{background:linear-gradient(180deg,rgba(16,29,41,.98),rgba(9,20,31,.99));border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:24px}.eyebrow{color:var(--blue);font-size:.78rem;text-transform:uppercase;letter-spacing:.09em;font-weight:900}h1{font-size:clamp(2rem,5vw,3.2rem);line-height:1.05;margin:.25rem 0}.muted,p{color:var(--muted)}.btn{display:inline-block;color:var(--text);text-decoration:none;border:1px solid var(--blue);border-radius:999px;padding:10px 14px;background:rgba(66,215,255,.14);font-weight:800}.btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.note{border-left:5px solid var(--amber);background:rgba(255,209,102,.08);border-radius:14px;padding:12px 14px;margin-top:16px;color:var(--muted)}
</style>
</head>
<body>
<main class="wrap">
<section class="card"><div class="eyebrow">CyberShield Legacy Loader</div><h1>Loading the previous Trust Kernel / TrustMap experience.</h1><p class="muted">This page loads the preserved previous root experience from the backup branch.</p><div class="btns"><a class="btn" href="index.html">Current Entry Point</a><a class="btn" href="demo-readiness.html">Current Demo</a></div><div class="note" id="status">Loading legacy build...</div></section>
</main>
<script>
(async function(){
  const legacyUrl = 'https://raw.githubusercontent.com/MaximumJusticeCybersecurity/CyberShield/backup-main-before-atdr-20260605/index.html';
  const status = document.getElementById('status');
  try {
    const response = await fetch(legacyUrl, { cache: 'no-store' });
    if (!response.ok) throw new Error('Legacy fetch failed with status ' + response.status);
    const html = await response.text();
    document.open();
    document.write(html);
    document.close();
  } catch (error) {
    status.textContent = 'Legacy build could not be loaded from the backup branch. Use the current entry point or open the repository backup branch directly.';
    console.error(error);
  }
})();
</script>
</body>
</html>
