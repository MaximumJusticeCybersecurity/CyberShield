<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CyberShield Google Sheet Row Verification</title><link rel="icon" href="assets/mjc-logo-2026.png"><style>
:root{--bg:#07131f;--panel:#101923;--line:#2d4358;--text:#f7fbff;--muted:#b9c7d6;--blue:#42d7ff;--green:#77e1a1;--amber:#ffd166;--red:#ff7474}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#06111c,#07131f);color:var(--text);font-family:Aptos,Calibri,Arial,sans-serif}.wrap{width:min(1040px,calc(100vw - 28px));margin:auto;padding:28px 0}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px;margin:12px 0}h1,h2{margin:.2rem 0 .7rem}p,label,li{color:var(--muted)}a{color:var(--blue)}input,select,textarea{width:100%;background:#07111c;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:10px;font:inherit}textarea{min-height:100px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.checks{display:grid;grid-template-columns:1fr 1fr;gap:8px}.check{border:1px solid var(--line);border-radius:12px;padding:10px}.check input{width:auto}button{border:1px solid var(--line);border-radius:10px;background:#132232;color:var(--text);padding:9px 13px;cursor:pointer}.primary{border-color:var(--blue);background:rgba(66,215,255,.18)}.tag{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:4px 8px}.good{color:var(--green)}.warn{color:var(--amber)}.bad{color:var(--red)}pre{white-space:pre-wrap;max-height:420px;overflow:auto;background:#07111c;border:1px solid var(--line);border-radius:12px;padding:12px;color:#dff6ff}@media(max-width:760px){.grid,.checks{grid-template-columns:1fr}}
</style></head><body><main class="wrap"><section class="card"><h1>Google Sheet Row Verification</h1><p>This is the operational gate for claiming capture success. Browser submission alone is not proof that a row was written.</p><p><a href="vendor-risk-next.html">Preferred Demo</a> · <a href="report-capture-test.html">Capture Test</a> · <a href="capture-source-of-truth-smoke.html">Source Smoke</a></p><p id="config"></p></section><section class="card"><h2>Verification Evidence</h2><div class="grid"><label>Report ID<input id="reportId" placeholder="CS-..."></label><label>Verified Sheet row number<input id="row" type="number" min="1" placeholder="123"></label><label>Verifier name<input id="verifier" placeholder="Dr. Max Justice"></label><label>Verification timestamp<input id="timestamp" type="datetime-local"></label></div><label>Notes<textarea id="notes" placeholder="What was observed in the row?"></textarea></label></section><section class="card"><h2>Required Checks</h2><div class="checks" id="checks"></div><p id="status"><span class="tag warn">Not verified</span></p><button id="save" class="primary">Save Verification</button> <button id="download">Download Evidence JSON</button> <button id="clear">Clear</button></section><section class="card"><h2>Verification Record</h2><pre id="output">{}</pre></section></main><script type="module">
import { CRM_SHEET_ID, REPORT_CAPTURE_ENDPOINT, REPORT_CAPTURE_MODE } from './src/atdr/report-capture-config.js';const KEY='cybershield_google_sheet_verification_2026061910';const labels=['Correct Sheet ID','New row exists','Report ID matches','Vendor and organization match','Recommended action matches','Risk and confidence match','Human review flag matches','Full structured record JSON present','No private credentials exposed'];const checks=document.querySelector('#checks');checks.innerHTML=labels.map((l,i)=>`<label class="check"><input type="checkbox" data-check="${i}"> ${l}</label>`).join('');document.querySelector('#config').innerHTML=`<span class="tag ${REPORT_CAPTURE_ENDPOINT?'good':'warn'}">${REPORT_CAPTURE_ENDPOINT?'Endpoint configured':'Endpoint blank'}</span> <span class="tag warn">Mode: ${REPORT_CAPTURE_MODE}</span><br><strong>Sheet ID:</strong> <code>${CRM_SHEET_ID}</code>`;
function build(){const done=[...document.querySelectorAll('[data-check]')].map((el,i)=>({check:labels[i],passed:el.checked}));return{verification_version:'2026061910',sheet_id:CRM_SHEET_ID,endpoint_configured:Boolean(REPORT_CAPTURE_ENDPOINT),capture_mode:REPORT_CAPTURE_MODE,report_id:document.querySelector('#reportId').value.trim(),sheet_row_number:Number(document.querySelector('#row').value||0),verifier:document.querySelector('#verifier').value.trim(),verified_at:document.querySelector('#timestamp').value||'',notes:document.querySelector('#notes').value.trim(),checks:done,verified:done.every(c=>c.passed)&&Boolean(document.querySelector('#reportId').value.trim())&&Number(document.querySelector('#row').value)>0&&Boolean(document.querySelector('#verifier').value.trim()),required_claim_language:'Payload submitted to the configured endpoint. Verify the Google Sheet row before claiming capture success.',allowed_success_language:'Saved successfully to Google Sheets only after this verification record is complete.'}}
function render(){const v=build();document.querySelector('#status').innerHTML=`<span class="tag ${v.verified?'good':'bad'}">${v.verified?'ROW VERIFIED':'NOT VERIFIED'}</span>`;document.querySelector('#output').textContent=JSON.stringify(v,null,2);window.__VERIFY__=v}[...document.querySelectorAll('input,textarea')].forEach(el=>el.addEventListener('input',render));document.querySelector('#save').onclick=()=>{const v=build();localStorage.setItem(KEY,JSON.stringify(v));render()};document.querySelector('#download').onclick=()=>{const blob=new Blob([JSON.stringify(window.__VERIFY__,null,2)],{type:'application/json'});const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=`cybershield-google-sheet-verification-${Date.now()}.json`;a.click();URL.revokeObjectURL(u)};document.querySelector('#clear').onclick=()=>{localStorage.removeItem(KEY);location.reload()};try{const saved=JSON.parse(localStorage.getItem(KEY)||'null');if(saved){document.querySelector('#reportId').value=saved.report_id||'';document.querySelector('#row').value=saved.sheet_row_number||'';document.querySelector('#verifier').value=saved.verifier||'';document.querySelector('#timestamp').value=saved.verified_at||'';document.querySelector('#notes').value=saved.notes||'';[...document.querySelectorAll('[data-check]')].forEach((el,i)=>el.checked=Boolean(saved.checks?.[i]?.passed));}}catch{}render();
</script></body></html>
