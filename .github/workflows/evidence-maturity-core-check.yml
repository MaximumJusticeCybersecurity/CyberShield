name: Evidence Maturity Core Check

on:
  push:
    branches:
      - agent/2026070314-evidence-maturity-implementation
    paths:
      - src/atdr/evidence-maturity.js
      - src/atdr/evidence-maturity-test.js
      - .github/workflows/evidence-maturity-core-check.yml
  pull_request:
    paths:
      - src/atdr/evidence-maturity.js
      - src/atdr/evidence-maturity-test.js
      - .github/workflows/evidence-maturity-core-check.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-core:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out reviewed commit
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check syntax
        shell: bash
        run: |
          set -euo pipefail
          node --check src/atdr/evidence-maturity.js
          node --check src/atdr/evidence-maturity-test.js

      - name: Run deterministic core tests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          node src/atdr/evidence-maturity-test.js | tee artifacts/evidence-maturity-core.txt

      - name: Record implementation boundary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "commit=$GITHUB_SHA"
            echo 'engine_integration=false'
            echo 'record_contract_change=false'
            echo 'public_workflow_change=false'
            echo 'deployment=false'
          } >> artifacts/evidence-maturity-core.txt

      - name: Upload validation evidence
        uses: actions/upload-artifact@v4
        with:
          name: evidence-maturity-core-validation
          path: artifacts/evidence-maturity-core.txt
          retention-days: 14
