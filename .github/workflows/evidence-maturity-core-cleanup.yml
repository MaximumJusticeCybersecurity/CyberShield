name: Evidence Maturity Core Cleanup

on:
  pull_request:
    branches:
      - main
    paths:
      - docs/verification/2026070314-evidence-maturity-core-cleanup.patch
      - .github/workflows/evidence-maturity-core-cleanup.yml

permissions:
  contents: write

jobs:
  apply-cleanup:
    if: github.head_ref == 'agent/2026070314-evidence-maturity-implementation'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Apply exact reviewed patch
        shell: bash
        run: |
          set -euo pipefail
          git apply --check docs/verification/2026070314-evidence-maturity-core-cleanup.patch
          git apply docs/verification/2026070314-evidence-maturity-core-cleanup.patch

      - name: Verify single authoritative export
        shell: bash
        run: |
          set -euo pipefail
          node --check src/atdr/evidence-maturity.js
          node --check src/atdr/decision-ceiling.js
          node --check src/atdr/evidence-maturity-test.js
          node src/atdr/evidence-maturity-test.js
          test "$(grep -R "export function calculateDecisionCeiling\|export { calculateDecisionCeiling" -n src/atdr/evidence-maturity.js src/atdr/decision-ceiling.js | wc -l)" -eq 2

      - name: Commit API cleanup
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'CyberShield Evidence Maturity Implementation'
          git config user.email 'actions@users.noreply.github.com'
          git add src/atdr/evidence-maturity.js
          git commit -m 'Use hardened Decision Ceiling as the public core export'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
