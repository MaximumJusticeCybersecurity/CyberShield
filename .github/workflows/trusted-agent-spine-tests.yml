name: Trusted Agent Spine Tests

on:
  pull_request:
    paths:
      - 'src/atdr/trusted-agent-spine.js'
      - 'src/atdr/trust-decision-record-schema-mapper.js'
      - 'tools/trusted-agent-spine-static-check.mjs'
      - 'vendor-risk-next.html'
      - 'trusted-agent-spine-smoke.html'
      - 'internal-qa.html'
      - 'route-manifest.json'
      - 'docs/20260708-trusted-agent-spine-p1-completion-packet.md'
      - '.github/workflows/trusted-agent-spine-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out exact candidate without persisted credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Report runtime
        run: node --version

      - name: Check reusable modules
        run: |
          node --check src/atdr/trusted-agent-spine.js
          node --check src/atdr/trust-decision-record-schema-mapper.js
          node --check tools/trusted-agent-spine-static-check.mjs

      - name: Parse route contract
        run: node -e "JSON.parse(require('fs').readFileSync('route-manifest.json','utf8'))"

      - name: Run deterministic static regression
        run: node tools/trusted-agent-spine-static-check.mjs

      - name: Verify no package or external-action dependency was introduced
        run: |
          test ! -f package-lock.json
          test ! -f node_modules/.package-lock.json
          grep -q "unverified_static_prototype" src/atdr/trusted-agent-spine.js
          grep -q "fnv1a32-demo-only" src/atdr/trusted-agent-spine.js
