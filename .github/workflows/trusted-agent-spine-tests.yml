name: Trusted Agent Spine Tests

on:
  pull_request:
    paths:
      - 'packages/trusted-agent-spine/**'
      - 'src/agent-spine/reusable-agent-spine.js'
      - 'src/domain-packs/recruiting-opportunity-pack.js'
      - 'src/atdr/trusted-agent-spine.js'
      - 'src/atdr/trust-decision-record-schema-mapper.js'
      - 'tools/trusted-agent-spine-static-check.mjs'
      - 'tools/reusable-agent-spine-p2-check.mjs'
      - 'tools/trusted-agent-spine-package-check.mjs'
      - 'tools/trusted-agent-spine-consumer-check.mjs'
      - '.github/workflows/trusted-agent-spine-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out exact candidate without persisted credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Report runtime
        run: node --version && npm --version
      - name: Check reusable modules
        run: |
          node --check packages/trusted-agent-spine/src/*.js
          node --check src/agent-spine/reusable-agent-spine.js
          node --check src/domain-packs/recruiting-opportunity-pack.js
          node --check src/atdr/trusted-agent-spine.js
          node --check src/atdr/trust-decision-record-schema-mapper.js
          node --check tools/trusted-agent-spine-static-check.mjs
          node --check tools/reusable-agent-spine-p2-check.mjs
          node --check tools/trusted-agent-spine-package-check.mjs
          node --check tools/trusted-agent-spine-consumer-check.mjs
      - name: Parse package contracts and schemas
        run: find packages/trusted-agent-spine -type f -name '*.json' -print0 | xargs -0 -n1 node -e "JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'))"
      - name: Run existing CyberShield and Recruiting regressions
        run: node tools/trusted-agent-spine-static-check.mjs && node tools/reusable-agent-spine-p2-check.mjs
      - name: Run package contract checks
        run: node tools/trusted-agent-spine-package-check.mjs
      - name: Pack private candidate and install in isolated non-CyberShield consumer
        run: |
          set -euo pipefail
          mkdir -p artifacts
          npm pack ./packages/trusted-agent-spine --json --pack-destination artifacts > artifacts/pack.json
          TARBALL=$(node -e "const p=require('./artifacts/pack.json');process.stdout.write(p[0].filename)")
          TMP=$(mktemp -d)
          npm init -y --prefix "$TMP" >/dev/null
          npm install --prefix "$TMP" --ignore-scripts --no-audit --no-fund --offline "$PWD/artifacts/$TARBALL" >/dev/null
          node tools/trusted-agent-spine-consumer-check.mjs "$TMP/node_modules/@maximumjustice/trusted-agent-spine"
          SHA=$(sha256sum "artifacts/$TARBALL" | awk '{print $1}')
          node -e "const fs=require('fs');const p=require('./artifacts/pack.json')[0];fs.writeFileSync('artifacts/package-integrity.json',JSON.stringify({package:'@maximumjustice/trusted-agent-spine',version:'0.1.0',filename:p.filename,sha256:process.argv[1],size:p.size,files:p.files.map(f=>f.path).sort(),commit:process.env.GITHUB_SHA},null,2)+'\n')" "$SHA"
          cat artifacts/package-integrity.json
      - name: Verify no authority or external-action dependency was introduced
        run: |
          test ! -f package-lock.json
          test -f packages/trusted-agent-spine/package-lock.json
          grep -q "fnv1a32-demo-only" packages/trusted-agent-spine/src/core.js
          grep -q "compatibility-re-export" packages/trusted-agent-spine/compatibility.json
          ! grep -R -E "from ['\"](axios|puppeteer|playwright|selenium|@octokit|googleapis|child_process)['\"]" packages/trusted-agent-spine/src src/agent-spine src/domain-packs
          ! grep -R -E "\bfetch\s*\(" packages/trusted-agent-spine/src src/agent-spine src/domain-packs
      - name: Upload candidate package integrity evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: trusted-agent-spine-package-integrity
          path: artifacts/
          retention-days: 14
