name: Trust-Led Conversion Check

on:
  pull_request:
    paths:
      - index.html
      - vendor-risk-next.html
      - pilot-package.html
      - src/vercel-analytics.js
      - route-manifest.json
      - governance-summary.json
      - tools/trust-led-conversion-static-check.mjs
      - tools/trust-led-conversion-browser-smoke.html
      - tools/trust-led-conversion-record-launcher.html
      - docs/2026062312-vercel-web-analytics.md
      - docs/2026062510-trust-led-conversion-traceability.md
      - docs/2026062510-trust-led-conversion-completion-packet.md
      - .github/workflows/trust-led-conversion-check.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trust-led-check:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Check out reviewed commit
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run trust-led conversion static checks
        run: node tools/trust-led-conversion-static-check.mjs

      - name: Locate headless Chrome
        id: chrome
        shell: bash
        run: |
          set -euo pipefail
          CHROME="$(command -v google-chrome-stable || command -v google-chrome || command -v chromium-browser || command -v chromium || true)"
          test -n "$CHROME"
          echo "path=$CHROME" >> "$GITHUB_OUTPUT"
          "$CHROME" --version

      - name: Start local static server
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/cybershield-http.log 2>&1 &
          echo $! > /tmp/cybershield-http.pid
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:4173/index.html > /dev/null; then
              exit 0
            fi
            sleep 0.5
          done
          cat /tmp/cybershield-http.log
          exit 1

      - name: Exercise judgment-to-record browser flow
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          "${{ steps.chrome.outputs.path }}" \
            --headless=new \
            --no-sandbox \
            --disable-gpu \
            --hide-scrollbars \
            --run-all-compositor-stages-before-draw \
            --virtual-time-budget=15000 \
            --dump-dom \
            http://127.0.0.1:4173/tools/trust-led-conversion-browser-smoke.html \
            > artifacts/browser-smoke-dom.html
          grep -q 'BROWSER_SMOKE_PASS' artifacts/browser-smoke-dom.html
          if grep -q 'BROWSER_SMOKE_FAIL' artifacts/browser-smoke-dom.html; then
            cat artifacts/browser-smoke-dom.html
            exit 1
          fi

      - name: Capture desktop and mobile review screenshots
        shell: bash
        run: |
          set -euo pipefail
          CHROME="${{ steps.chrome.outputs.path }}"
          mkdir -p artifacts
          "$CHROME" --headless=new --no-sandbox --disable-gpu --hide-scrollbars --run-all-compositor-stages-before-draw --virtual-time-budget=4000 --window-size=1440,1100 --screenshot="$PWD/artifacts/landing-desktop.png" http://127.0.0.1:4173/index.html
          "$CHROME" --headless=new --no-sandbox --disable-gpu --hide-scrollbars --run-all-compositor-stages-before-draw --virtual-time-budget=4000 --window-size=390,844 --screenshot="$PWD/artifacts/landing-mobile.png" http://127.0.0.1:4173/index.html
          "$CHROME" --headless=new --no-sandbox --disable-gpu --hide-scrollbars --run-all-compositor-stages-before-draw --virtual-time-budget=5000 --window-size=1440,1200 --screenshot="$PWD/artifacts/record-desktop.png" http://127.0.0.1:4173/tools/trust-led-conversion-record-launcher.html
          "$CHROME" --headless=new --no-sandbox --disable-gpu --hide-scrollbars --run-all-compositor-stages-before-draw --virtual-time-budget=4000 --window-size=1440,1100 --screenshot="$PWD/artifacts/pilot-desktop.png" http://127.0.0.1:4173/pilot-package.html

      - name: Upload browser review evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trust-led-conversion-browser-evidence
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14

      - name: Stop local static server
        if: always()
        shell: bash
        run: |
          if test -f /tmp/cybershield-http.pid; then
            kill "$(cat /tmp/cybershield-http.pid)" || true
          fi
          cat /tmp/cybershield-http.log || true
