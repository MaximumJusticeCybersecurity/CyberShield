name: CyberShield Pilot vNext P1 Tests

on:
  pull_request:
    paths:
      - 'src/vnext/**'
      - 'tests/pilot-vnext-p1.test.mjs'
      - 'schemas/trust-decision-record-vnext.schema.json'
      - 'pilot-vnext-qa.html'
      - 'route-manifest.json'
      - '.github/workflows/pilot-vnext-p1-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out exact candidate without persisted credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Report runtime
        run: node --version
      - name: Parse controlled schemas and manifests
        run: |
          node -e "JSON.parse(require('fs').readFileSync('schemas/trust-decision-record-vnext.schema.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('route-manifest.json','utf8'))"
      - name: Check implementation syntax
        run: node --check src/vnext/*.js && node --check tests/pilot-vnext-p1.test.mjs
      - name: Run deterministic migration, semantic, lifecycle, and abuse tests
        run: node --test tests/pilot-vnext-p1.test.mjs
      - name: Prove bounded P1 dependencies
        run: |
          ! grep -R -E "\b(fetch|XMLHttpRequest|WebSocket)\s*\(" src/vnext
          ! grep -R -E "from ['\"](axios|puppeteer|playwright|selenium|child_process|googleapis)['\"]" src/vnext
          grep -q 'noindex,nofollow' pilot-vnext-qa.html
          grep -q 'vendor-risk-next.html' route-manifest.json
          grep -q 'vendor-risk.html' route-manifest.json
