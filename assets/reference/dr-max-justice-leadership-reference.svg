<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Dr. Max Justice cybersecurity leadership brand reference">
<title>Dr. Max Justice cybersecurity leadership brand reference</title>
<desc>Builder reference derived from the supplied leadership image. Use for brand tone: credible public-sector cybersecurity leadership, named human ownership, MJC shield, and the idea that security fails when no one owns it.</desc>
<defs><linearGradient id="left" x1="0" x2="1"><stop offset="0" stop-color="#030b17"/><stop offset="1" stop-color="#09233f" stop-opacity="0.78"/></linearGradient><linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#56a7e8"/><stop offset="1" stop-color="#c8e5fa"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>.title{fill:white;font:700 52px Arial}.blue{fill:#86dcff}.small{fill:white;font:25px Arial}.name{fill:white;font:700 28px Arial;letter-spacing:2px}.role{fill:#89defc;font:24px Arial}.tag{fill:white;font:17px Arial;letter-spacing:1px}.shield{fill:#092037;stroke:#d6f5ff;stroke-width:3;filter:url(#glow)}.cap{fill:#e6e4db;stroke:#d0d0d0}.suit{fill:#10192b;stroke:#24344f}.skin{fill:#dca27e}.pink{fill:#f4a2ca}.nav{fill:#052542}.icon{fill:none;stroke:#9be6ff;stroke-width:3}</style></defs>
