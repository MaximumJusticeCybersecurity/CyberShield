<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CyberShield Decision Assurance Workbench</title>
<link rel="icon" href="assets/mjc-logo-2026.png">
<style>
:root{--bg:#07131f;--panel:#101923;--panel2:#151f2b;--line:#2d4358;--text:#f7fbff;--muted:#b9c7d6;--blue:#42d7ff;--cyan:#8eeaff;--amber:#ffd166;--red:#ff7474;--green:#77e1a1;--graphite:#202a35;--shadow:0 18px 46px rgba(0,0,0,.38)}*{box-sizing:border-box}html{font-size:16px}body{margin:0;background:linear-gradient(180deg,#06111c,#0a1724 44%,#07131f);color:var(--text);font-family:Aptos,Calibri,Inter,Arial,sans-serif;line-height:1.48}button,input,select,textarea{font:inherit}button{cursor:pointer;border:1px solid var(--line);border-radius:12px;padding:10px 14px;background:#132232;color:var(--text)}button:hover{border-color:var(--blue)}button.primary{background:linear-gradient(180deg,rgba(66,215,255,.22),rgba(20,43,61,.95));border-color:var(--blue)}button.ghost{background:transparent}input,select,textarea{width:100%;background:#08131f;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:11px}textarea{min-height:170px;resize:vertical}.topbar{position:sticky;top:0;z-index:20;display:flex;gap:16px;align-items:center;justify-content:space-between;padding:13px 20px;background:rgba(7,19,31,.97);border-bottom:1px solid var(--line);box-shadow:0 8px 24px rgba(0,0,0,.24)}.brand{display:flex;align-items:center;gap:12px}.brand img{width:46px;height:46px;object-fit:contain}.eyebrow,.chip,.label{color:var(--blue);font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;font-weight:800}.brand strong{display:block;font-size:1.05rem}.top-actions{display:flex;gap:9px;flex-wrap:wrap}.layout{display:grid;grid-template-columns:230px minmax(0,1fr) 360px;gap:16px;width:min(1580px,calc(100vw - 28px));margin:0 auto;padding:18px 0 42px}.rail,.panel,.brief{background:linear-gradient(180deg,rgba(18,31,44,.98),rgba(11,22,34,.99));border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}.rail{position:sticky;top:86px;align-self:start;padding:12px}.rail button{width:100%;text-align:left;margin:4px 0;border-radius:11px}.rail button.active{border-color:var(--blue);background:rgba(66,215,255,.15)}.workspace{display:grid;gap:16px}.panel{padding:20px}.panel h1,.panel h2,.panel h3{margin:.2rem 0 .8rem;line-height:1.14}.panel p{color:var(--muted)}.brief{position:sticky;top:86px;align-self:start;padding:18px}.brief-card{border:1px solid rgba(66,215,255,.24);border-radius:14px;padding:13px;margin:10px 0;background:rgba(255,255,255,.045)}.metric{font-size:1.5rem;font-weight:900;line-height:1.1}.bad{color:var(--red)}.warn{color:var(--amber)}.good{color:var(--green)}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:13px}.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}.callout{border-left:5px solid var(--amber);background:rgba(255,209,102,.08);padding:12px 14px;border-radius:12px;color:var(--muted)}.notice{border-left:5px solid var(--blue);background:rgba(66,215,255,.08);padding:12px 14px;border-radius:12px;color:var(--muted)}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:14px}table{width:100%;border-collapse:collapse;min-width:860px}th,td{padding:11px;border-bottom:1px solid rgba(185,199,214,.16);vertical-align:top;text-align:left}th{color:var(--cyan);font-size:.82rem;text-transform:uppercase;letter-spacing:.06em;background:#0a1826}td{color:#eaf5ff}.tag{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:4px 8px;margin:2px;color:var(--muted);font-size:.82rem}.tag.warn{border-color:rgba(255,209,102,.6);color:var(--amber)}.tag.bad{border-color:rgba(255,116,116,.6);color:var(--red)}.tag.good{border-color:rgba(119,225,161,.6);color:var(--green)}.evidence-card{border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.045);padding:13px;margin:9px 0}.hidden{display:none!important}.print-doc{display:none}.signature-box{height:96px;border:1px solid #8a98a8;margin:10px 0 8px;background:#fff}.review-line{border-bottom:1px solid #9ba8b6;min-height:30px}@media(max-width:1120px){.layout{grid-template-columns:1fr}.rail,.brief{position:static}.rail{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.rail button{margin:0}.grid2,.grid3{grid-template-columns:1fr}}@page{size:Letter;margin:.62in .68in .7in .68in}@media print{html,body{background:#fff!important;color:#111!important}.topbar,.layout{display:none!important}.print-doc{display:block!important;color:#111;font-family:Aptos,Calibri,Arial,sans-serif;font-size:10.4pt;line-height:1.12}.print-page{position:relative;padding:0}.print-page:before{content:"";display:block;height:58px;background:url('assets/mjc-logo-2026.png') left top/54px 54px no-repeat;border-bottom:3px solid #123d5c;margin-bottom:14px}.print-doc h1{font-size:21pt;line-height:1.05;margin:0 0 6px;color:#07131f;letter-spacing:-.02em}.print-doc h2{font-size:13.2pt;line-height:1.08;margin:14px 0 6px;color:#07131f;border-bottom:1px solid #b9c7d6;padding-bottom:4px}.print-doc h3{font-size:11.4pt;margin:10px 0 4px;color:#07131f}.print-doc p{margin:4px 0;color:#111}.print-doc ul{margin:5px 0 8px 18px;padding:0}.print-doc li{margin:2px 0;color:#111}.print-doc table{min-width:0;width:100%;font-size:8.6pt;border-collapse:collapse;page-break-inside:auto}.print-doc tr{page-break-inside:avoid;page-break-after:auto}.print-doc th,.print-doc td{border:1px solid #c7d0d9;padding:5px 6px;color:#111;vertical-align:top}.print-doc th{background:#e8f4fb;color:#07131f;text-transform:uppercase;letter-spacing:.03em;font-size:7.7pt}.print-callout{border:1px solid #98b8ce;border-left:7px solid #137aa8;padding:9px 11px;margin:10px 0 12px;background:#f5fbff;page-break-inside:avoid}.print-callout p{margin:3px 0}.footer{position:fixed;bottom:.25in;left:.68in;right:.68in;font-size:8pt;color:#555;border-top:1px solid #d9dfe6;padding-top:4px}.signature-box{height:92px;border:1px solid #444;background:#fff;page-break-inside:avoid}.review-line{height:28px;border-bottom:1px solid #444}.print-doc strong{color:#07131f}.print-doc a{color:#07131f;text-decoration:none}}
</style>
</head>
<body>
<header class="topbar"><div class="brand"><img src="assets/mjc-logo-2026.png" alt="MJC logo"><span><span class="eyebrow">CyberShield Decision Assurance</span><strong>Trust Decision Record Workbench</strong></span></div><div class="top-actions"><button id="loadDemoTop" class="primary" type="button">Reload Current Demo</button><button id="printTop" type="button">Print / Save PDF</button><button id="downloadJsonTop" type="button">Download JSON</button></div></header>
<main class="layout">
<nav class="rail" id="stageRail"></nav>
<section class="workspace" id="workspace"></section>
<aside class="brief" id="decisionBrief"></aside>
</main>
<section class="print-doc" id="printDoc"></section>
<script type="module" src="src/atdr/atdr-app.js"></script>
<script type="module" src="src/atdr/atdr-v16-brief-polish.js"></script>
<script type="module" src="src/atdr/atdr-demo-router-fix.js"></script>
<script type="module" src="src/atdr/atdr-demo-coach.js"></script>
<script type="module" src="src/atdr/atdr-out-of-scope-cta.js"></script>
</body>
</html>
