<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CyberShield Vendor-Risk Next</title>
<link rel="icon" href="assets/mjc-logo-2026.png">
<style>
:root{--bg:#07131f;--panel:#101923;--line:#2d4358;--text:#f7fbff;--muted:#b9c7d6;--blue:#42d7ff;--amber:#ffd166;--red:#ff7474;--green:#77e1a1;--shadow:0 18px 46px rgba(0,0,0,.32)}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#06111c,#0a1724 48%,#07131f);color:var(--text);font-family:Aptos,Calibri,Inter,Arial,sans-serif;line-height:1.45}button,input,select{font:inherit}button{border:1px solid var(--line);border-radius:12px;padding:10px 14px;background:#132232;color:var(--text);cursor:pointer}button:hover{border-color:var(--blue)}button.primary{background:linear-gradient(180deg,rgba(66,215,255,.24),rgba(20,43,61,.95));border-color:var(--blue)}input,select{width:100%;background:#08131f;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:11px}.topbar{position:sticky;top:0;z-index:20;display:flex;gap:16px;align-items:center;justify-content:space-between;padding:13px 20px;background:rgba(7,19,31,.97);border-bottom:1px solid var(--line);box-shadow:0 8px 24px rgba(0,0,0,.24)}.brand{display:flex;gap:12px;align-items:center}.brand img{width:46px;height:46px;object-fit:contain}.eyebrow,.chip,.label{color:var(--blue);font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;font-weight:800}.brand strong{display:block}.layout{width:min(1320px,calc(100vw - 28px));margin:0 auto;padding:22px 0 48px;display:grid;grid-template-columns:minmax(0,1fr) 380px;gap:16px}.panel,.brief-card,.side{background:linear-gradient(180deg,rgba(18,31,44,.98),rgba(11,22,34,.99));border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}.panel{padding:22px}.side{position:sticky;top:86px;align-self:start;padding:18px}.brief-card{padding:14px;margin:10px 0;background:rgba(255,255,255,.045)}h1,h2,h3{margin:.2rem 0 .8rem;line-height:1.12}p,li{color:var(--muted)}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:13px}.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}.stepper{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:12px 0 18px}.step{border:1px solid var(--line);border-radius:12px;padding:10px;background:rgba(255,255,255,.04);color:var(--muted);font-size:.9rem}.step.active{border-color:var(--blue);color:var(--text);background:rgba(66,215,255,.12)}.tag{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:4px 8px;margin:2px;color:var(--muted);font-size:.82rem}.tag.warn{border-color:rgba(255,209,102,.6);color:var(--amber)}.tag.bad{border-color:rgba(255,116,116,.6);color:var(--red)}.tag.good{border-color:rgba(119,225,161,.6);color:var(--green)}.metric{font-size:1.45rem;font-weight:900}.warn{color:var(--amber)}.bad{color:var(--red)}.good{color:var(--green)}table{width:100%;border-collapse:collapse;min-width:760px}th,td{padding:10px;border-bottom:1px solid rgba(185,199,214,.16);vertical-align:top;text-align:left}th{color:#8eeaff;background:#0a1826;font-size:.8rem;text-transform:uppercase;letter-spacing:.06em}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:14px}.callout{border-left:5px solid var(--amber);background:rgba(255,209,102,.08);padding:12px 14px;border-radius:12px;color:var(--muted)}pre{white-space:pre-wrap;max-height:260px;overflow:auto;background:#07111c;border:1px solid var(--line);border-radius:12px;padding:12px;color:#dff6ff}.print-report{display:none}.signature{border:1px solid #b8c4cf;padding:10px;margin-top:10px}.signature-line{border-bottom:1px solid #111;height:28px;margin:10px 0}.pillrow{margin:.25rem 0}.route-note{border-left:5px solid var(--green);background:rgba(119,225,161,.08);border-radius:12px;padding:10px 12px;color:var(--muted);margin:10px 0}@media(max-width:960px){.layout{grid-template-columns:1fr}.side{position:static}.grid2,.grid3,.stepper{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}}@page{size:Letter;margin:.55in}@media print{.topbar,.side,.actions,.stepper,pre,.layout{display:none!important}.print-report{display:block!important;background:#fff!important;color:#111!important;font-family:Aptos,Calibri,Arial,sans-serif;font-size:10pt;line-height:1.16}.print-report:before{content:"CyberShield AI Trust Decision Record";display:block;font-size:20pt;font-weight:900;color:#07131f;border-bottom:3px solid #123d5c;margin-bottom:12px;padding-bottom:8px}.print-report p,.print-report td,.print-report li{color:#111!important}.print-report h1{font-size:18pt;color:#07131f;margin:.1rem 0 .5rem}.print-report h2{font-size:13pt;color:#07131f;border-bottom:1px solid #b8c4cf;padding-bottom:4px;margin:12px 0 6px}.print-report .brief-card{border:1px solid #b8c4cf;box-shadow:none;background:#fff;color:#111;page-break-inside:avoid;padding:8px;margin:6px 0}.print-report table{min-width:0;font-size:8pt}.print-report th,.print-report td{border:1px solid #c7d0d9;color:#111;padding:5px}.print-report th{background:#e8f4fb;color:#07131f}a{color:#111;text-decoration:none}}
</style>
</head>
<body>
<header class="topbar"><div class="brand"><img src="assets/mjc-logo-2026.png" alt="MJC logo"><span><span class="eyebrow">CyberShield Guided Demo Next</span><strong>Vendor-Risk AI Decision Assurance</strong></span></div><div class="actions"><button id="resetDemo" type="button">Reset Demo</button><button id="printTop" type="button">Print / Save PDF</button></div></header>
<main class="layout"><section class="panel" id="app"></section><aside class="side" id="side"></aside></main>
<section class="print-report" id="printReport"></section>
<script type="module">
import { analyzeRecommendation, exportJson } from './src/atdr/atdr-engine.js';
import { VENDOR_RISK_CONTRADICTORY_DEMO } from './src/atdr/atdr-demo-data.js';
import { REPORT_CAPTURE_ENDPOINT, CRM_SHEET_ID, REPORT_CAPTURE_MODE } from './src/atdr/report-capture-config.js';
const KEY='cybershield_vendor_risk_next_2026061134';
const STEPS=['Identify','Recommend','Contradict','Review','Decide','Record'];
const DEFAULT={step:0,firstName:'',company:'',vendor:'Vendor X',contradiction:'all',email:''};
const CONTRADICTIONS={all:['Show all evidence issues','SOC 2 scope, data-use terms, subprocessors, incident notification, self-attestation, and business pressure all need review.'],soc2:['SOC 2 Scope Conflict','SOC 2 exists, but the evaluated AI service is not clearly included in scope.'],data_use:['Data Use Conflict','Data-use language allows service improvement and derived use, so privacy and legal review are required.'],subprocessors:['Subprocessor Gap','AI analytics subprocessors are not fully identified in the evidence package.'],incident:['Incident Notification Weakness','Incident notification language lacks a fixed timeline.'],self_attested:['Self-attested Evidence','Encryption and questionnaire evidence are vendor assertions, not independent proof.']};
const VALIDATORS=[['SOC 2 scope','Needs Evidence','SOC 2 exists, but the evaluated AI service must be in scope.'],['Encryption proof','Needs Evidence','Vendor assertions are not independent proof.'],['Framework mapping','Fail','Mapping is relevance, not compliance proof.'],['Data-use terms','Needs Evidence','Service improvement and derived-use language must be reviewed.'],['Subprocessors','Needs Evidence','AI analytics providers and downstream access must be known.'],['Incident notification','Needs Evidence','Without undue delay is not a fixed timeline.'],['Human approval','Fail','Business comfort is not accountable vendor-risk approval.']];
const ACTIONS=[['Approve','Loses','Not defensible','Material evidence gaps remain.'],['Accept with Caveat','Loses','Premature','Caveats are unresolved and material.'],['Escalate for Review','Advances','Required but incomplete','Human review is required but does not supply evidence.'],['Request Evidence','Wins','Strongest defensible action','Preserves defensibility before approval.'],['Reject','Holds','Possible later','Not enough evidence yet for outright rejection.'],['Quarantine','Holds','Use for active exposure','Appropriate if active use or urgent exposure is discovered.']];
const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const state=()=>{try{return {...DEFAULT,...JSON.parse(sessionStorage.getItem(KEY)||'{}')}}catch{return {...DEFAULT}}};
const save=n=>{const s={...state(),...n};sessionStorage.setItem(KEY,JSON.stringify(s));return s};
const evidenceText=()=>VENDOR_RISK_CONTRADICTORY_DEMO.evidence_repository.map(e=>`[${e.evidence_name}] ${e.text_extract}`).join('\n');
const recommendation=s=>`AI recommends approving ${s.vendor||'Vendor X'} because they have a SOC 2 report, encrypt customer data, and appear low risk.`;
const active=s=>CONTRADICTIONS[s.contradiction]||CONTRADICTIONS.all;
function record(s=state()){return analyzeRecommendation({recommendation:recommendation(s),domain:'vendor-risk',evidence:evidenceText(),aiSource:'User-pasted AI recommendation',sourceModel:'Unknown',intendedUse:'Vendor approval recommendation review before enterprise action',context:`${s.company||'The organization'} is reviewing ${s.vendor||'Vendor X'} for an AI-assisted customer support analytics service. ${VENDOR_RISK_CONTRADICTORY_DEMO.decision_context}`,decisionOwner:s.firstName?`${s.firstName} or pending vendor-risk owner assignment`:'Pending vendor-risk owner assignment',createdBy:s.firstName||'Demo user'});}
function summary(s=state()){const r=record(s);return{r,claims:r.extracted_claims.length,material:r.extracted_claims.filter(c=>c.materiality==='High').length,conflicts:r.extracted_claims.filter(c=>c.conflict_status==='Material conflict').length,missing:r.missing_support.filter(m=>m.severity==='High').length,action:r.recommended_action,risk:r.risk_if_wrong.band,confidence:r.confidence_band,review:r.human_review.required?'Yes':'No'};}
function trustDecisionRecord(s=state(),eventType='view_report'){const x=summary(s);return{record_id:x.r.record_id,report_id:`CS-${new Date().toISOString().replace(/[-:.TZ]/g,'').slice(0,12)}-${Math.random().toString(36).slice(2,6).toUpperCase()}`,created_timestamp:new Date().toISOString(),first_name:s.firstName,company_or_organization:s.company||'your company name would go here',vendor_name:s.vendor||'vendor name would go here',decision_domain:'vendor_risk',selected_contradiction_type:s.contradiction,original_ai_recommendation:recommendation(s),claims:x.r.extracted_claims,evidence_items:VENDOR_RISK_CONTRADICTORY_DEMO.evidence_repository,validator_results:VALIDATORS.map((v,i)=>({validator_id:`VR-${i+1}`,validator_name:v[0],status:v[1],explanation:v[2]})),candidate_actions:ACTIONS.map((a,i)=>({candidate_action_id:`CA-${i+1}`,action_label:a[0],result:a[1],defensibility:a[2],rationale:a[3],selected_as_recommendation:a[0]==='Request Evidence'})),risk_if_wrong_band:x.risk,confidence_band:x.confidence,cyberShield_recommended_action:x.action,escalation_triggered:true,human_review_required:true,required_reviewer_roles:['Vendor-Risk Owner','Security SME','Legal/Privacy Reviewer','Business Owner'],record_defensibility_band:'Not defensible yet without additional evidence',visitor_email:s.email,report_action:eventType,crm_sheet_id:CRM_SHEET_ID,report_capture_mode:REPORT_CAPTURE_MODE,limitations:['Static prototype','Synthetic demo evidence','Browser Print / Save PDF export path','Google Sheet capture is prototype-grade only']};}
const stepper=s=>`<div class="stepper">${STEPS.map((t,i)=>`<button class="step ${s.step===i?'active':''}" data-step="${i}" type="button"><span class="chip">${i+1}</span><br>${esc(t)}</button>`).join('')}</div>`;
function identify(s){return`<h1>Start with the reviewer, company, and vendor.</h1><p>This route uses session storage so a fresh browser session starts cleanly. It proves one workflow: AI-generated vendor recommendation in, defensible AI Trust Decision Record out.</p><div class="grid3"><label>First name<input id="firstName" value="${esc(s.firstName)}" placeholder="Jane"></label><label>Company, optional<input id="company" value="${esc(s.company)}" placeholder="Acme Health"></label><label>Vendor, optional<input id="vendor" value="${esc(s.vendor)}" placeholder="Vendor X"></label></div><div class="callout"><strong>Goal:</strong> show why the AI recommendation is not enough to approve a vendor handling customer data.</div>`}
function recommend(s){return`<h1>AI-generated vendor recommendation</h1><p>The recommendation sounds reasonable because it mentions SOC 2, encryption, and low risk.</p><div class="brief-card"><span class="label">Original AI Recommendation</span><h2>${esc(recommendation(s))}</h2></div><div class="grid3"><article class="brief-card"><span class="label">Apparent support</span><p>SOC 2 exists.</p></article><article class="brief-card"><span class="label">Apparent support</span><p>Encryption is claimed.</p></article><article class="brief-card"><span class="label">Unsupported leap</span><p>Appears low risk.</p></article></div>`}
function contradict(s){const cards=VENDOR_RISK_CONTRADICTORY_DEMO.evidence_repository.slice(0,6).map(e=>`<article class="brief-card"><span class="label">${esc(e.evidence_name)}</span><p>${esc(e.caveat||e.text_extract)}</p><p><span class="tag ${e.contradiction_flag?'bad':'warn'}">${e.contradiction_flag?'Contradiction':'Caveat'}</span><span class="tag ${e.self_attestation_flag?'bad':'warn'}">${e.self_attestation_flag?'Self-attested':e.source_authority_band}</span></p></article>`).join('');return`<h1>Select the contradiction to expose.</h1><label>Contradiction type<select id="contradiction">${Object.entries(CONTRADICTIONS).map(([k,v])=>`<option value="${k}" ${s.contradiction===k?'selected':''}>${esc(v[0])}</option>`).join('')}</select></label><div class="brief-card"><span class="label">Selected Focus</span><h2>${esc(active(s)[0])}</h2><p>${esc(active(s)[1])}</p></div><div class="grid3">${cards}</div>`}
function review(s){const x=summary(s);const rows=x.r.extracted_claims.map(c=>`<tr><td>${esc(c.claim_id)}</td><td>${esc(c.normalized_claim)}</td><td>${esc(c.materiality)}</td><td>${esc(c.conflict_status)}</td></tr>`).join('');const vc=VALIDATORS.map(v=>`<article class="brief-card"><span class="label">Validator</span><h3>${esc(v[0])}</h3><p><span class="tag ${v[1]==='Fail'?'bad':'warn'}">${esc(v[1])}</span></p><p>${esc(v[2])}</p></article>`).join('');return`<h1>CyberShield extracts claims, gaps, and validators.</h1><div class="grid3"><article class="brief-card"><span class="label">Claims</span><div class="metric">${x.claims}</div><p>${x.material} material claim(s).</p></article><article class="brief-card"><span class="label">Conflicts</span><div class="metric bad">${x.conflicts}</div><p>Material evidence conflict(s).</p></article><article class="brief-card"><span class="label">Missing support</span><div class="metric warn">${x.missing}</div><p>High-severity gap(s).</p></article></div><h2>Validator Checks</h2><div class="grid3">${vc}</div><h2>Material Claims</h2><div class="table-wrap"><table><thead><tr><th>ID</th><th>Claim</th><th>Materiality</th><th>Conflict</th></tr></thead><tbody>${rows}</tbody></table></div>`}
function decide(s){const x=summary(s);const rows=ACTIONS.map(a=>`<tr><td>${esc(a[0])}</td><td><span class="tag ${a[1]==='Wins'?'good':a[1]==='Loses'?'bad':'warn'}">${esc(a[1])}</span></td><td>${esc(a[2])}</td><td>${esc(a[3])}</td></tr>`).join('');return`<h1>Candidate Action Tournament</h1><p>CyberShield compares actions by defensibility, not by a fake numeric trust score.</p><div class="grid3"><article class="brief-card"><span class="label">Winner</span><div class="metric good">Request Evidence</div></article><article class="brief-card"><span class="label">Risk If Wrong</span><div class="metric bad">${esc(x.risk)}</div></article><article class="brief-card"><span class="label">Confidence</span><div class="metric warn">${esc(x.confidence)}</div></article></div><div class="table-wrap"><table><thead><tr><th>Candidate Action</th><th>Result</th><th>Defensibility</th><th>Reason</th></tr></thead><tbody>${rows}</tbody></table></div>`}
function recordStep(s){const x=summary(s);return`<h1>Generate the AI Trust Decision Record.</h1><p>Enter an email only when generating, printing, downloading, or saving the report.</p><div id="captureStatus" class="callout" style="display:none"></div><div class="grid2"><label>Email for report follow-up<input id="email" type="email" value="${esc(s.email)}" placeholder="name@company.com"></label><label>Capture status<input readonly value="${REPORT_CAPTURE_ENDPOINT?'Endpoint configured, verify row':'Simulation only'}"></label></div><div class="grid3"><article class="brief-card"><span class="label">Record ID</span><p>${esc(x.r.record_id)}</p></article><article class="brief-card"><span class="label">Action</span><div class="metric warn">${esc(x.action)}</div></article><article class="brief-card"><span class="label">Human Review</span><div class="metric bad">${esc(x.review)}</div></article></div><div class="actions"><button id="capture" class="primary" type="button">Save Follow-Up</button><button id="print" type="button">Print / Save PDF</button><button id="download" type="button">Download JSON</button></div>`}
function side(s){const x=summary(s);return`<div class="route-note"><strong>Experimental route:</strong> richer panels rebuilt without MutationObserver loops. Keep /vendor-risk.html as the stable buyer route until this route is tested.</div><div class="brief-card"><span class="label">Decision Brief</span><p><span class="tag bad">Not defensible yet</span><span class="tag good">Request Evidence wins</span></p><p><strong>Risk If Wrong:</strong> ${esc(x.risk)}<br><strong>Confidence:</strong> ${esc(x.confidence)}<br><strong>Human Review:</strong> ${esc(x.review)}</p><p><strong>Primary issue:</strong> ${esc(active(s)[1])}</p></div><div class="brief-card"><span class="label">Capture</span><p><span class="tag ${REPORT_CAPTURE_ENDPOINT?'good':'warn'}">${REPORT_CAPTURE_ENDPOINT?'Endpoint configured':'Simulated'}</span></p><p>Sheet ID source of truth: <code>${esc(CRM_SHEET_ID)}</code></p></div>`}
function printReport(s=state()){const t=trustDecisionRecord(s,'print_report');const claims=t.claims.slice(0,10).map(c=>`<tr><td>${esc(c.claim_id)}</td><td>${esc(c.normalized_claim)}</td><td>${esc(c.materiality)}</td><td>${esc(c.conflict_status)}</td></tr>`).join('');const vals=t.validator_results.map(v=>`<tr><td>${esc(v.validator_name)}</td><td>${esc(v.status)}</td><td>${esc(v.explanation)}</td></tr>`).join('');return`<h1>AI Trust Decision Record</h1><p><strong>Subject:</strong> AI Trust Decision Record for ${esc(t.vendor_name)} Vendor-Risk Recommendation<br><strong>Prepared for:</strong> ${esc(t.company_or_organization)}<br><strong>Report ID:</strong> ${esc(t.report_id)}<br><strong>Record ID:</strong> ${esc(t.record_id)}</p><div class="brief-card"><h2>Executive Decision Brief</h2><p><strong>Decision Readiness:</strong> Not Defensible Yet<br><strong>Strongest Defensible Action:</strong> Request Evidence<br><strong>Risk If Wrong:</strong> ${esc(t.risk_if_wrong_band)}<br><strong>Confidence Band:</strong> ${esc(t.confidence_band)}<br><strong>Human Review Required:</strong> Yes</p></div><h2>Recommendation Under Review</h2><p>${esc(t.original_ai_recommendation)}</p><h2>Material Claims and Evidence</h2><table><thead><tr><th>ID</th><th>Claim</th><th>Materiality</th><th>Conflict</th></tr></thead><tbody>${claims}</tbody></table><h2>Validator Check Results</h2><table><thead><tr><th>Validator</th><th>Status</th><th>Explanation</th></tr></thead><tbody>${vals}</tbody></table><h2>Human Review Requirement</h2><p>Required reviewers: ${t.required_reviewer_roles.map(esc).join(', ')}.</p><h2>Limitations</h2><ul>${t.limitations.map(l=>`<li>${esc(l)}</li>`).join('')}</ul><div class="signature"><h2>Reviewer and Signature Block</h2><p><strong>Dr. Max Justice</strong><br>vCISO | Security SME | Cybersecurity SME<br>CISSP | PMP | PhD, Technology & Innovation Management – Cybersecurity<br>Creator, CHN vCISO GPT powered by Cyber Shield<br>U.S. Veteran<br>Maximum Justice Cybersecurity</p><p>Signature:</p><div class="signature-line"></div><p>Date:</p><div class="signature-line"></div><p>Reviewer Decision: ☐ Approved ☐ Approved with Caveat ☐ Request Evidence ☐ Escalate for Review ☐ Reject</p></div><p><strong>Prepared by CyberShield, powered by Maximum Justice Cybersecurity.</strong></p>`}
function content(s){return[identify,recommend,contradict,review,decide,recordStep][s.step](s)}
function render(){const s=state();document.querySelector('#app').innerHTML=stepper(s)+content(s)+(s.step<5?`<div class="actions"><button id="back" ${s.step<=0?'disabled':''}>Back</button><button id="next" class="primary">Next</button></div>`:'');document.querySelector('#side').innerHTML=side(s);document.querySelector('#printReport').innerHTML=printReport(s);wire();}
function syncInputs(){['firstName','company','vendor','contradiction','email'].forEach(id=>{const el=document.querySelector('#'+id);if(el)el.onchange=e=>{save({[id]:e.target.value});render();}})}
function setStatus(m){const el=document.querySelector('#captureStatus');if(el){el.style.display='block';el.textContent=m}}
async function capture(eventType){const s=state();const payload=trustDecisionRecord(s,eventType);if(!s.email){setStatus('Enter an email before saving follow-up.');return payload}if(!REPORT_CAPTURE_ENDPOINT){setStatus('Report prepared. Capture simulated honestly because endpoint is not configured.');return payload}try{await fetch(REPORT_CAPTURE_ENDPOINT,{method:'POST',mode:'no-cors',body:JSON.stringify(payload)});setStatus('Payload submitted to configured endpoint. Verify the Google Sheet row before claiming capture success.')}catch(e){setStatus('Capture failed before submission. Report remains available.')}return payload}
function downloadJson(){const blob=new Blob([JSON.stringify(trustDecisionRecord(state(),'download_json'),null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`cybershield-ai-trust-decision-record-${Date.now()}.json`;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)}
function wire(){syncInputs();document.querySelectorAll('[data-step]').forEach(b=>b.onclick=()=>{save({step:Number(b.dataset.step)});render()});document.querySelector('#back')?.addEventListener('click',()=>{save({step:Math.max(0,state().step-1)});render()});document.querySelector('#next')?.addEventListener('click',()=>{save({step:Math.min(5,state().step+1)});render()});document.querySelector('#print')?.addEventListener('click',async()=>{await capture('print_report');window.print()});document.querySelector('#printTop')?.addEventListener('click',async()=>{await capture('top_print_report');window.print()});document.querySelector('#download')?.addEventListener('click',async()=>{await capture('download_json');downloadJson()});document.querySelector('#capture')?.addEventListener('click',()=>capture('save_follow_up'))}
document.querySelector('#resetDemo').onclick=()=>{sessionStorage.removeItem(KEY);render()};
render();
</script>
</body>
</html>
