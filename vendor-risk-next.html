<style>
:root{--bg:#07131f;--panel:#101923;--line:#2d4358;--text:#f7fbff;--muted:#b9c7d6;--blue:#42d7ff;--amber:#ffd166;--red:#ff7474;--green:#77e1a1;--shadow:0 18px 46px rgba(0,0,0,.32)}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#06111c,#0a1724 48%,#07131f);color:var(--text);font-family:Aptos,Calibri,Inter,Arial,sans-serif;line-height:1.45}button,input,select{font:inherit}button,.button-link{border:1px solid var(--line);border-radius:12px;padding:10px 14px;background:#132232;color:var(--text);cursor:pointer;text-decoration:none;display:inline-block}button:hover,.button-link:hover{border-color:var(--blue)}button.primary,.button-link.primary{background:linear-gradient(180deg,rgba(66,215,255,.24),rgba(20,43,61,.95));border-color:var(--blue)}button.secondary,.button-link.secondary{border-color:rgba(185,199,214,.45);background:rgba(255,255,255,.04)}input,select{width:100%;background:#08131f;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:11px}.topbar{position:sticky;top:0;z-index:20;display:flex;gap:16px;align-items:center;justify-content:space-between;padding:13px 20px;background:rgba(7,19,31,.97);border-bottom:1px solid var(--line);box-shadow:0 8px 24px rgba(0,0,0,.24)}.brand{display:flex;gap:12px;align-items:center}.brand img{width:46px;height:46px;object-fit:contain}.eyebrow,.chip,.label{color:var(--blue);font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;font-weight:800}.brand strong{display:block}.layout{width:min(1320px,calc(100vw - 28px));margin:0 auto;padding:22px 0 48px;display:grid;grid-template-columns:minmax(0,1fr) 380px;gap:16px}.panel,.brief-card,.side{background:linear-gradient(180deg,rgba(18,31,44,.98),rgba(11,22,34,.99));border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}.panel{padding:22px}.side{position:sticky;top:86px;align-self:start;padding:18px}.brief-card{padding:14px;margin:10px 0;background:rgba(255,255,255,.045)}h1,h2,h3{margin:.2rem 0 .8rem;line-height:1.12}p,li{color:var(--muted)}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:13px}.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}.judgment-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin:16px 0}.judgment{min-height:86px;text-align:left}.stepper{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:12px 0 18px}.step{border:1px solid var(--line);border-radius:12px;padding:10px;background:rgba(255,255,255,.04);color:var(--muted);font-size:.9rem}.step.active{border-color:var(--blue);color:var(--text);background:rgba(66,215,255,.12)}.tag{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:4px 8px;margin:2px;color:var(--muted);font-size:.82rem}.tag.warn{border-color:rgba(255,209,102,.6);color:var(--amber)}.tag.bad{border-color:rgba(255,116,116,.6);color:var(--red)}.tag.good{border-color:rgba(119,225,161,.6);color:var(--green)}.metric{font-size:1.45rem;font-weight:900}.warn{color:var(--amber)}.bad{color:var(--red)}.good{color:var(--green)}table{width:100%;border-collapse:collapse;min-width:760px}th,td{padding:10px;border-bottom:1px solid rgba(185,199,214,.16);vertical-align:top;text-align:left}th{color:#8eeaff;background:#0a1826;font-size:.8rem;text-transform:uppercase;letter-spacing:.06em}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:14px}.callout{border-left:5px solid var(--amber);background:rgba(255,209,102,.08);padding:12px 14px;border-radius:12px;color:var(--muted)}.trust-note{border-left:5px solid var(--green);background:rgba(119,225,161,.08);border-radius:12px;padding:12px 14px;color:var(--muted);margin:10px 0}pre{white-space:pre-wrap;max-height:260px;overflow:auto;background:#07111c;border:1px solid var(--line);border-radius:12px;padding:12px;color:#dff6ff}.print-report{display:none}.signature{border:1px solid #b8c4cf;padding:10px;margin-top:10px}.signature-line{border-bottom:1px solid #111;height:28px;margin:10px 0}.pillrow{margin:.25rem 0}@media(max-width:960px){.layout{grid-template-columns:1fr}.side{position:static}.grid2,.grid3,.judgment-grid,.stepper{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}}@page{size:Letter;margin:.55in}@media print{.topbar,.side,.actions,.stepper,pre,.layout{display:none!important}.print-report{display:block!important;background:#fff!important;color:#111!important;font-family:Aptos,Calibri,Arial,sans-serif;font-size:10pt;line-height:1.16}.print-report:before{content:"CyberShield AI Trust Decision Record";display:block;font-size:20pt;font-weight:900;color:#07131f;border-bottom:3px solid #123d5c;margin-bottom:12px;padding-bottom:8px}.print-report p,.print-report td,.print-report li{color:#111!important}.print-report h1{font-size:18pt;color:#07131f;margin:.1rem 0 .5rem}.print-report h2{font-size:13pt;color:#07131f;border-bottom:1px solid #b8c4cf;padding-bottom:4px;margin:12px 0 6px}.print-report .brief-card{border:1px solid #b8c4cf;box-shadow:none;background:#fff;color:#111;page-break-inside:avoid;padding:8px;margin:6px 0}.print-report table{min-width:0;font-size:8pt}.print-report th,.print-report td{border:1px solid #c7d0d9;color:#111;padding:5px}.print-report th{background:#e8f4fb;color:#07131f}a{color:#111;text-decoration:none}}

<body>
<header class="topbar"><div class="brand"><img src="assets/mjc-logo-2026.png" alt="Maximum Justice Cybersecurity logo"><span><span class="eyebrow">CyberShield</span><strong>Challenge One AI Recommendation</strong></span></div><div class="actions"><button id="resetDemo" type="button">Reset Example</button><button id="printTop" type="button">Print / Save PDF</button></div></header>
<main class="layout"><section class="panel" id="app"></section><aside class="side" id="side"></aside></main>
<section class="print-report" id="printReport"></section>
<script type="module">
import { analyzeRecommendation } from './src/atdr/atdr-engine.js';
import { VENDOR_RISK_CONTRADICTORY_DEMO } from './src/atdr/atdr-demo-data.js';
import { REPORT_CAPTURE_ENDPOINT, CRM_SHEET_ID, REPORT_CAPTURE_MODE } from './src/atdr/report-capture-config.js';
import { trackConversion } from './src/vercel-analytics.js';

const KEY='cybershield_vendor_risk_challenge_2026062510';
const STEPS=['Challenge','Evidence','Personalize','Review','Decide','Record'];
const DEFAULT={step:0,judgment:'',firstName:'',company:'',vendor:'Vendor X',contradiction:'all',email:''};
const CONTRADICTIONS={all:['Show all evidence issues','SOC 2 scope, data-use terms, subprocessors, incident notification, self-attestation, and business pressure all need review.'],soc2:['SOC 2 Scope Conflict','SOC 2 exists, but the evaluated AI service is not clearly included in scope.'],data_use:['Data Use Conflict','Data-use language allows service improvement and derived use, so privacy and legal review are required.'],subprocessors:['Subprocessor Gap','AI analytics subprocessors are not fully identified in the evidence package.'],incident:['Incident Notification Weakness','Incident notification language lacks a fixed timeline.'],self_attested:['Self-attested Evidence','Encryption and questionnaire evidence are vendor assertions, not independent proof.']};
const VALIDATORS=[['SOC 2 scope','Needs Evidence','SOC 2 exists, but the evaluated AI service must be in scope.'],['Encryption proof','Needs Evidence','Vendor assertions are not independent proof.'],['Framework mapping','Fail','Mapping is relevance, not compliance proof.'],['Data-use terms','Needs Evidence','Service improvement and derived-use language must be reviewed.'],['Subprocessors','Needs Evidence','AI analytics providers and downstream access must be known.'],['Incident notification','Needs Evidence','Without undue delay is not a fixed timeline.'],['Human approval','Fail','Business comfort is not accountable vendor-risk approval.']];
const ACTIONS=[['Approve','Loses','Not defensible','Material evidence gaps remain.'],['Accept with Caveat','Loses','Premature','Caveats are unresolved and material.'],['Escalate for Review','Advances','Required but incomplete','Human review is required but does not supply evidence.'],['Request Evidence','Wins','Strongest defensible action for this evidence set','Preserves defensibility before approval.'],['Reject','Holds','Possible later','Not enough evidence yet for outright rejection.'],['Quarantine','Holds','Use for active exposure','Appropriate if active use or urgent exposure is discovered.']];
const trackedStages=new Set();
const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const state=()=>{try{return {...DEFAULT,...JSON.parse(sessionStorage.getItem(KEY)||'{}')}}catch{return {...DEFAULT}}};
const save=n=>{const s={...state(),...n};sessionStorage.setItem(KEY,JSON.stringify(s));return s};
const evidenceText=()=>VENDOR_RISK_CONTRADICTORY_DEMO.evidence_repository.map(e=>`[${e.evidence_name}] ${e.text_extract}`).join('\n');
const recommendation=s=>`AI recommends approving ${s.vendor||'Vendor X'} because they have a SOC 2 report, encrypt customer data, and appear low risk.`;
const active=s=>CONTRADICTIONS[s.contradiction]||CONTRADICTIONS.all;

function record(s=state()){
  return analyzeRecommendation({
    recommendation:recommendation(s),domain:'vendor-risk',evidence:evidenceText(),aiSource:'User-pasted AI recommendation',sourceModel:'Unknown',intendedUse:'Vendor approval recommendation review before enterprise action',context:`${s.company||'The organization'} is reviewing ${s.vendor||'Vendor X'} for an AI-assisted customer support analytics service. ${VENDOR_RISK_CONTRADICTORY_DEMO.decision_context}`,decisionOwner:s.firstName?`${s.firstName} or pending vendor-risk owner assignment`:'Pending vendor-risk owner assignment',createdBy:s.firstName||'Demo user'
  });
}
function summary(s=state()){
  const r=record(s);
  return{r,claims:r.extracted_claims.length,material:r.extracted_claims.filter(c=>c.materiality==='High').length,conflicts:r.extracted_claims.filter(c=>c.conflict_status==='Material conflict').length,missing:r.missing_support.filter(m=>m.severity==='High').length,action:r.recommended_action,risk:r.risk_if_wrong.band,confidence:r.confidence_band,review:r.human_review.required?'Yes':'No'};
}
function humanLegibility(s=state(),x=summary(s)){
  return{summary:'The decision record separates the AI recommendation, evidence limits, CyberShield inference, required human review, and next action.',decision_owner:s.firstName?`${s.firstName} or pending vendor-risk owner assignment`:'Pending vendor-risk owner assignment',human_authority_status:'Meaningful human review required before vendor approval',approval_meaningfulness:'Not meaningful until the reviewer can inspect evidence, challenge the recommendation, reject it, and document residual risk.',facts:['AI recommended vendor approval based on SOC 2, encryption, and low risk language.','CyberShield extracted reviewable vendor-risk claims.','Synthetic demo evidence contains scope, data-use, subprocessor, incident-notice, and self-attestation issues.'],assumptions:['SOC 2 and encryption claims are not enough to approve the vendor without service scope and implementation evidence.','The accountable vendor-risk owner has not yet accepted residual risk.'],inferences:['The approval recommendation is not defensible yet.','Request Evidence is stronger than approval or caveated acceptance for this evidence set.','Escalation is required because Risk If Wrong is High and confidence is Low.'],recommendations:['Request missing evidence before approval.','Escalate to Vendor-Risk Owner, Security SME, Legal/Privacy Reviewer, and Business Owner.','Document any human override and residual risk acknowledgment.'],uncertainty_notes:'Static prototype using synthetic demo evidence; no live verification, model introspection, or production integration is claimed.',challenge_test_status:'Challenge-tested by deterministic validators and candidate action comparison.',challenge_findings:['SOC 2 existence is not automatic approval.','Framework mapping is not compliance proof.','AI-generated confidence is not evidence.'],sycophancy_risk:'Flagged: the AI recommendation accepted vendor assurance language too easily.',generic_ai_output_risk:'Flagged: recommendation is polished but not evidence-sufficient.',human_agency_risk:'Controlled by requiring a documented human decision and next human action.',next_human_action:'Collect required evidence, assign reviewers, then approve, reject, defer, or override with rationale.'};
}
function harnessHealth(s=state(),x=summary(s)){
  return{summary:'Harness Health Assessment checks whether the AI-influenced recommendation sits inside a maintained review setup.',checks:[{name:'Inputs / Sources',status:'Needs evidence',finding:'Evidence sources are synthetic for demo and include missing, stale, self-attested, and scope-limited items.'},{name:'Reach / Permissions',status:'Constrained',finding:'CyberShield analyzes and recommends; it does not approve vendors, change systems, spend money, or send external communications.'},{name:'Job / Purpose',status:'Clear',finding:'Current job is vendor-risk AI Decision Assurance, not autonomous agent execution or broad Aegis implementation.'},{name:'Proof / Evidence',status:'Needs evidence',finding:'Proof trail must show sources checked, sources unavailable, gaps, contradictions, and validator results.'},{name:'Value / Usefulness',status:'Useful with limits',finding:'The record helps reviewers avoid acting on polished but unsupported AI output, while preserving limitations.'}],score:'Constrained / Needs Evidence',maintenance_recommendation:'Improve evidence completeness, constrain authority, and keep the harness under human-governed maintenance.',rollback_path:'The stable fallback route remains preserved for provenance and regression review.'};
}
function legibilityHarnessSection(s=state()){
  const x=summary(s),h=humanLegibility(s,x),hh=harnessHealth(s,x);
  return`<h2>Human Legibility</h2><div class="grid3"><article class="brief-card"><span class="label">Decision Owner</span><p>${esc(h.decision_owner)}</p></article><article class="brief-card"><span class="label">Authority</span><p>${esc(h.human_authority_status)}</p></article><article class="brief-card"><span class="label">Next Human Action</span><p>${esc(h.next_human_action)}</p></article></div><div class="brief-card"><span class="label">Facts / Assumptions / Inferences</span><p><strong>Facts:</strong> ${h.facts.map(esc).join(' ')}</p><p><strong>Assumptions:</strong> ${h.assumptions.map(esc).join(' ')}</p><p><strong>Inferences:</strong> ${h.inferences.map(esc).join(' ')}</p></div><div class="brief-card"><span class="label">Challenge Tested</span><p>${esc(h.challenge_test_status)}</p><p>${h.challenge_findings.map(item=>`<span class="tag warn">${esc(item)}</span>`).join('')}</p></div><h2>Harness Health Assessment</h2><div class="grid3">${hh.checks.map(c=>`<article class="brief-card"><span class="label">${esc(c.name)}</span><h3>${esc(c.status)}</h3><p>${esc(c.finding)}</p></article>`).join('')}</div><div class="callout"><strong>Harness recommendation:</strong> ${esc(hh.maintenance_recommendation)} ${esc(hh.rollback_path)}</div>`;
}
function trustDecisionRecord(s=state(),eventType='view_report'){
  const x=summary(s);
  return{record_id:x.r.record_id,report_id:`CS-${new Date().toISOString().replace(/[-:.TZ]/g,'').slice(0,12)}-${Math.random().toString(36).slice(2,6).toUpperCase()}`,created_timestamp:new Date().toISOString(),first_name:s.firstName,company_or_organization:s.company||'your company name would go here',vendor_name:s.vendor||'vendor name would go here',decision_domain:'vendor_risk',selected_contradiction_type:s.contradiction,original_ai_recommendation:recommendation(s),claims:x.r.extracted_claims,evidence_items:VENDOR_RISK_CONTRADICTORY_DEMO.evidence_repository,validator_results:VALIDATORS.map((v,i)=>({validator_id:`VR-${i+1}`,validator_name:v[0],status:v[1],explanation:v[2]})),candidate_actions:ACTIONS.map((a,i)=>({candidate_action_id:`CA-${i+1}`,action_label:a[0],result:a[1],defensibility:a[2],rationale:a[3],selected_as_recommendation:a[0]==='Request Evidence'})),risk_if_wrong_band:x.risk,confidence_band:x.confidence,cyberShield_recommended_action:x.action,escalation_triggered:true,human_review_required:true,required_reviewer_roles:['Vendor-Risk Owner','Security SME','Legal/Privacy Reviewer','Business Owner'],record_defensibility_band:'Not defensible yet without additional evidence',visitor_email:s.email,report_action:eventType,crm_sheet_id:CRM_SHEET_ID,report_capture_mode:REPORT_CAPTURE_MODE,limitations:['Static prototype','Synthetic demo evidence','Browser Print / Save PDF export path','Prototype-grade follow-up capture; downstream row verification required'],human_legibility:humanLegibility(s,x),harness_health:harnessHealth(s,x)};
}
function publicRecord(s=state(),eventType='download_json'){
  const full={...trustDecisionRecord(s,eventType)};
  delete full.crm_sheet_id;
  delete full.visitor_email;
  return full;
}

const stepper=s=>`<div class="stepper">${STEPS.map((t,i)=>`<button class="step ${s.step===i?'active':''}" data-step="${i}" type="button"><span class="chip">${i+1}</span><br>${esc(t)}</button>`).join('')}</div>`;
function challenge(s){
  return`<h1>Would your current process approve this recommendation?</h1><p>Read the recommendation first.  You do not need to enter your name, company, vendor, or email to see what CyberShield finds.</p><div class="brief-card"><span class="label">Original AI Recommendation</span><h2>${esc(recommendation(s))}</h2></div><div class="judgment-grid"><button class="judgment ${s.judgment==='probably'?'primary':''}" data-judgment="probably" type="button"><strong>Probably</strong><br><span>The assurance language sounds sufficient.</span></button><button class="judgment ${s.judgment==='more_evidence'?'primary':''}" data-judgment="more_evidence" type="button"><strong>I would ask for more evidence</strong><br><span>The recommendation may be missing proof.</span></button><button class="judgment ${s.judgment==='unsure'?'primary':''}" data-judgment="unsure" type="button"><strong>I am not sure</strong><br><span>I need to see how the claims hold up.</span></button></div><div class="trust-note"><strong>Controlled demonstration using synthetic vendor evidence.</strong>  CyberShield does not approve vendors or replace accountable human review.</div>`;
}
function evidence(s){
  const cards=VENDOR_RISK_CONTRADICTORY_DEMO.evidence_repository.slice(0,6).map(e=>`<article class="brief-card"><span class="label">${esc(e.evidence_name)}</span><p>${esc(e.caveat||e.text_extract)}</p><p><span class="tag ${e.contradiction_flag?'bad':'warn'}">${e.contradiction_flag?'Contradiction':'Caveat'}</span><span class="tag ${e.self_attestation_flag?'bad':'warn'}">${e.self_attestation_flag?'Self-attested':e.source_authority_band}</span></p></article>`).join('');
  return`<h1>The recommendation sounds stronger than the evidence.</h1><p>CyberShield does not treat every artifact as equal proof.  This controlled evidence set contains scope limits, self-reported claims, contractual conflicts, and missing assurance.</p><label>Evidence issue to examine<select id="contradiction">${Object.entries(CONTRADICTIONS).map(([k,v])=>`<option value="${k}" ${s.contradiction===k?'selected':''}>${esc(v[0])}</option>`).join('')}</select></label><div class="brief-card"><span class="label">Selected Focus</span><h2>${esc(active(s)[0])}</h2><p>${esc(active(s)[1])}</p></div><div class="grid3">${cards}</div>`;
}
function personalize(s){
  return`<h1>Personalize the record, or continue without doing so.</h1><p>These fields are optional.  They appear only after the recommendation and evidence problem are visible.</p><div class="grid3"><label>First name, optional<input id="firstName" value="${esc(s.firstName)}" placeholder="Jane"></label><label>Company, optional<input id="company" value="${esc(s.company)}" placeholder="Acme Health"></label><label>Vendor, optional<input id="vendor" value="${esc(s.vendor)}" placeholder="Vendor X"></label></div><div class="callout"><strong>Decision authority remains human.</strong>  Personalization does not approve the vendor or change the evidence.</div>`;
}
function review(s){
  const x=summary(s);const rows=x.r.extracted_claims.map(c=>`<tr><td>${esc(c.claim_id)}</td><td>${esc(c.normalized_claim)}</td><td>${esc(c.materiality)}</td><td>${esc(c.conflict_status)}</td></tr>`).join('');const vc=VALIDATORS.map(v=>`<article class="brief-card"><span class="label">Validator</span><h3>${esc(v[0])}</h3><p><span class="tag ${v[1]==='Fail'?'bad':'warn'}">${esc(v[1])}</span></p><p>${esc(v[2])}</p></article>`).join('');
  return`<h1>CyberShield extracts claims, gaps, and validator results.</h1><div class="grid3"><article class="brief-card"><span class="label">Claims</span><div class="metric">${x.claims}</div><p>${x.material} material claim(s).</p></article><article class="brief-card"><span class="label">Conflicts</span><div class="metric bad">${x.conflicts}</div><p>Material evidence conflict(s).</p></article><article class="brief-card"><span class="label">Missing support</span><div class="metric warn">${x.missing}</div><p>High-severity gap(s).</p></article></div><h2>Validator Checks</h2><div class="grid3">${vc}</div><h2>Material Claims</h2><div class="table-wrap"><table><thead><tr><th>ID</th><th>Claim</th><th>Materiality</th><th>Conflict</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function decide(s){
  const x=summary(s);const rows=ACTIONS.map(a=>`<tr><td>${esc(a[0])}</td><td><span class="tag ${a[1]==='Wins'?'good':a[1]==='Loses'?'bad':'warn'}">${esc(a[1])}</span></td><td>${esc(a[2])}</td><td>${esc(a[3])}</td></tr>`).join('');
  return`<h1>Compare the candidate actions.</h1><p>CyberShield compares actions by defensibility.  For this controlled evidence set, Request Evidence is stronger than premature approval.</p><div class="grid3"><article class="brief-card"><span class="label">Strongest Action for This Evidence Set</span><div class="metric good">Request Evidence</div></article><article class="brief-card"><span class="label">Risk If Wrong</span><div class="metric bad">${esc(x.risk)}</div></article><article class="brief-card"><span class="label">Confidence</span><div class="metric warn">${esc(x.confidence)}</div></article></div><div class="table-wrap"><table><thead><tr><th>Candidate Action</th><th>Result</th><th>Defensibility</th><th>Reason</th></tr></thead><tbody>${rows}</tbody></table></div>${legibilityHarnessSection(s)}`;
}
function recordStep(s){
  const x=summary(s);
  return`<h1>Your AI Trust Decision Record is ready.</h1><p>You received the useful decision result before being asked for contact information.  Enter an email only when you choose report follow-up.</p><div id="captureStatus" class="callout" style="display:none"></div><div class="grid2"><label>Email for report follow-up, optional<input id="email" type="email" value="${esc(s.email)}" placeholder="name@company.com"></label><article class="brief-card"><span class="label">Controlled Example Result</span><p><strong>Request Evidence</strong><br>High Risk If Wrong<br>Low confidence<br>Human Review Required</p></article></div><div class="grid3"><article class="brief-card"><span class="label">Record ID</span><p>${esc(x.r.record_id)}</p></article><article class="brief-card"><span class="label">Action</span><div class="metric warn">${esc(x.action)}</div></article><article class="brief-card"><span class="label">Human Review</span><div class="metric bad">${esc(x.review)}</div></article></div>${legibilityHarnessSection(s)}<div class="trust-note"><strong>Your next decision does not need to remain hypothetical.</strong>  Bring one AI-generated recommendation your organization is currently considering.</div><div class="actions"><a id="reviewReal" class="button-link primary" href="mailto:max@maximumjusticecybersecurity.com?subject=Review%20One%20AI%20Recommendation">Review One of My Recommendations</a><a id="pilot" class="button-link secondary" href="pilot-package.html">Explore the 3-to-5 Recommendation Pilot</a></div><div class="actions"><button id="capture" type="button">Save Report Follow-Up</button><button id="print" type="button">Print / Save PDF</button><button id="download" type="button">Download JSON</button></div>`;
}
function side(s){
  const x=summary(s);
  return`<div class="trust-note"><strong>Controlled demonstration.</strong><br>Synthetic vendor evidence is used to demonstrate the review method.  CyberShield does not approve the vendor or replace accountable human review.</div><div class="brief-card"><span class="label">Decision Brief</span><p><span class="tag bad">Not defensible yet</span><span class="tag good">Request Evidence</span></p><p><strong>Risk If Wrong:</strong> ${esc(x.risk)}<br><strong>Confidence:</strong> ${esc(x.confidence)}<br><strong>Human Review:</strong> ${esc(x.review)}</p><p><strong>Primary issue:</strong> ${esc(active(s)[1])}</p></div><div class="brief-card"><span class="label">Why this is not AI judging AI</span><p>CyberShield separates claims, maps evidence, exposes gaps and contradictions, applies defined checks, and preserves the accountable human decision.  A second model opinion is not treated as proof.</p></div>`;
}
function printReport(s=state()){
  const t=trustDecisionRecord(s,'print_report');const claims=t.claims.slice(0,10).map(c=>`<tr><td>${esc(c.claim_id)}</td><td>${esc(c.normalized_claim)}</td><td>${esc(c.materiality)}</td><td>${esc(c.conflict_status)}</td></tr>`).join('');const vals=t.validator_results.map(v=>`<tr><td>${esc(v.validator_name)}</td><td>${esc(v.status)}</td><td>${esc(v.explanation)}</td></tr>`).join('');
  return`<h1>AI Trust Decision Record</h1><p><strong>Subject:</strong> AI Trust Decision Record for ${esc(t.vendor_name)} Vendor-Risk Recommendation<br><strong>Prepared for:</strong> ${esc(t.company_or_organization)}<br><strong>Report ID:</strong> ${esc(t.report_id)}<br><strong>Record ID:</strong> ${esc(t.record_id)}</p><div class="brief-card"><h2>Executive Decision Brief</h2><p><strong>Decision Readiness:</strong> Not Defensible Yet<br><strong>Strongest Defensible Action for This Evidence Set:</strong> Request Evidence<br><strong>Risk If Wrong:</strong> ${esc(t.risk_if_wrong_band)}<br><strong>Confidence Band:</strong> ${esc(t.confidence_band)}<br><strong>Human Review Required:</strong> Yes</p></div><h2>Recommendation Under Review</h2><p>${esc(t.original_ai_recommendation)}</p><h2>Material Claims and Evidence</h2><table><thead><tr><th>ID</th><th>Claim</th><th>Materiality</th><th>Conflict</th></tr></thead><tbody>${claims}</tbody></table><h2>Validator Check Results</h2><table><thead><tr><th>Validator</th><th>Status</th><th>Explanation</th></tr></thead><tbody>${vals}</tbody></table><h2>Human Review Requirement</h2><p>Required reviewers: ${t.required_reviewer_roles.map(esc).join(', ')}.</p><h2>Human Legibility</h2><p><strong>Decision owner:</strong> ${esc(t.human_legibility.decision_owner)}<br><strong>Authority:</strong> ${esc(t.human_legibility.human_authority_status)}<br><strong>Challenge status:</strong> ${esc(t.human_legibility.challenge_test_status)}<br><strong>Next human action:</strong> ${esc(t.human_legibility.next_human_action)}</p><h2>Harness Health Assessment</h2><table><thead><tr><th>Check</th><th>Status</th><th>Finding</th></tr></thead><tbody>${t.harness_health.checks.map(c=>`<tr><td>${esc(c.name)}</td><td>${esc(c.status)}</td><td>${esc(c.finding)}</td></tr>`).join('')}</tbody></table><p><strong>Harness recommendation:</strong> ${esc(t.harness_health.maintenance_recommendation)}</p><h2>Limitations</h2><ul>${t.limitations.map(l=>`<li>${esc(l)}</li>`).join('')}</ul><div class="signature"><h2>Reviewer and Signature Block</h2><p><strong>Dr. Max Justice</strong><br>vCISO | Security SME | Cybersecurity SME<br>CISSP | PMP | PhD, Technology & Innovation Management - Cybersecurity<br>Creator, CHN vCISO GPT powered by Cyber Shield<br>U.S. Veteran<br>Maximum Justice Cybersecurity</p><p>Signature:</p><div class="signature-line"></div><p>Date:</p><div class="signature-line"></div><p>Reviewer Decision: [ ] Approved [ ] Approved with Caveat [ ] Request Evidence [ ] Escalate for Review [ ] Reject</p></div><p><strong>Prepared by CyberShield, powered by Maximum Justice Cybersecurity.</strong></p>`;
}

function content(s){return[challenge,evidence,personalize,review,decide,recordStep][s.step](s)}
function trackStage(s){
  const key=`${s.step}`;
  if(trackedStages.has(key))return;
  trackedStages.add(key);
  if(s.step===1)trackConversion('evidence_problem_viewed',{route:'vendor-risk-next',stage:'evidence'});
  if(s.step===5)trackConversion('decision_record_viewed',{route:'vendor-risk-next',stage:'record'});
}
function render(){
  const s=state();
  document.querySelector('#app').innerHTML=stepper(s)+content(s)+(s.step<5&&s.step!==0?`<div class="actions"><button id="back" ${s.step<=0?'disabled':''}>Back</button><button id="next" class="primary">Next</button></div>`:'');
  document.querySelector('#side').innerHTML=side(s);
  document.querySelector('#printReport').innerHTML=printReport(s);
  trackStage(s);
  wire();
}
function syncInputs(){
  ['firstName','company','vendor','contradiction','email'].forEach(id=>{const el=document.querySelector('#'+id);if(el)el.onchange=e=>{save({[id]:e.target.value});render();}});
}
function setStatus(message){const el=document.querySelector('#captureStatus');if(el){el.style.display='block';el.textContent=message}}
async function capture(eventType){
  const s=state();const payload=trustDecisionRecord(s,eventType);
  if(!s.email){setStatus('Enter an email only if you want report follow-up.  Print and JSON remain available without it.');return payload}
  if(!REPORT_CAPTURE_ENDPOINT){setStatus('Report prepared.  Follow-up capture is simulated because the endpoint is not configured.');return payload}
  try{await fetch(REPORT_CAPTURE_ENDPOINT,{method:'POST',mode:'no-cors',body:JSON.stringify(payload)});setStatus('Payload submitted to the configured endpoint.  Verify the downstream row before claiming capture success.')}catch{setStatus('Capture failed before submission.  The report remains available.')}
  return payload;
}
function downloadJson(){
  const blob=new Blob([JSON.stringify(publicRecord(state(),'download_json'),null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`cybershield-ai-trust-decision-record-${Date.now()}.json`;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
}
function wire(){
  syncInputs();
  document.querySelectorAll('[data-step]').forEach(button=>button.onclick=()=>{save({step:Number(button.dataset.step)});render()});
  document.querySelectorAll('[data-judgment]').forEach(button=>button.onclick=()=>{const choice=button.dataset.judgment;save({judgment:choice,step:1});trackConversion('buyer_judgment_selected',{route:'vendor-risk-next',choice});render()});
  document.querySelector('#back')?.addEventListener('click',()=>{save({step:Math.max(0,state().step-1)});render()});
  document.querySelector('#next')?.addEventListener('click',()=>{save({step:Math.min(5,state().step+1)});render()});
  document.querySelector('#print')?.addEventListener('click',async()=>{trackConversion('report_print_clicked',{route:'vendor-risk-next',stage:'record'});await capture('print_report');window.print()});
  document.querySelector('#printTop')?.addEventListener('click',async()=>{trackConversion('report_print_clicked',{route:'vendor-risk-next',stage:'header'});await capture('top_print_report');window.print()});
  document.querySelector('#download')?.addEventListener('click',async()=>{trackConversion('report_json_downloaded',{route:'vendor-risk-next',stage:'record'});await capture('download_json');downloadJson()});
  document.querySelector('#capture')?.addEventListener('click',()=>capture('save_follow_up'));
  document.querySelector('#reviewReal')?.addEventListener('click',()=>trackConversion('real_recommendation_review_clicked',{route:'vendor-risk-next',destination:'email'}));
  document.querySelector('#pilot')?.addEventListener('click',()=>trackConversion('pilot_clicked',{route:'vendor-risk-next',destination:'pilot-package'}));
}

document.querySelector('#resetDemo').onclick=()=>{sessionStorage.removeItem(KEY);trackedStages.clear();trackConversion('example_started',{route:'vendor-risk-next',stage:'reset'});render()};
trackConversion('example_started',{route:'vendor-risk-next',stage:'challenge'});
render();
</script>
