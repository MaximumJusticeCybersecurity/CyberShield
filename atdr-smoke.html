r(--red)}.amber{color:var(--amber)}pre{white-space:pre-wrap;background:#06101a;border:1px solid var(--line);border-radius:12px;padding:14px;color:#e8f6ff}@media(max-width:850px){.kpis{grid-template-columns:1fr}.actions{display:grid}.btn{text-align:center}}
