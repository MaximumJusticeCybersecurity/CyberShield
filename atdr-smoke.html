<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CyberShield ATDR Smoke Test</title>
<style>
:root{--bg:#07131f;--panel:#111e2a;--text:#f7fbff;--muted:#b9c7d6;--line:#2d4358;--green:#77e1a1;--red:#ff7474;--blue:#42d7ff}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Aptos,Calibri,Arial,sans-serif;line-height:1.5}main{width:min(1100px,calc(100vw - 28px));margin:0 auto;padding:32px 0}.panel,.summary{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;margin:14px 0}h1,h2{margin:.2rem 0 .8rem}.muted{color:var(--muted)}table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden}th,td{border-bottom:1px solid var(--line);padding:10px;text-align:left;vertical-align:top}th{color:var(--blue)}tr.pass td:first-child{color:var(--green);font-weight:800}tr.fail td:first-child{color:var(--red);font-weight:800}.summary.pass{border-color:rgba(119,225,161,.7)}.summary.fail{border-color:rgba(255,116,116,.7)}pre{white-space:pre-wrap;background:#06101a;border:1px solid var(--line);border-radius:12px;padding:14px;color:#e8f6ff}</style>
</head>
<body>
<main>
<section class="panel"><h1>CyberShield ATDR Browser Smoke Test</h1><p class="muted">Runs deterministic checks against the vendor-risk contradictory-evidence demo. This is a static QA helper for the GitHub Pages prototype.</p><p><a style="color:var(--blue)" href="atdr.html">Open ATDR prototype</a></p></section>
<div id="result"></div>
</main>
<script type="module" src="src/atdr/atdr-smoke-test.js"></script>
</body>
</html>
