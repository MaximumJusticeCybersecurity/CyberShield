<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CyberShield AI Trust Decision Record</title><link rel="icon" href="assets/mjc-logo-2026.png"><style>
:root{--navy:#07131f;--blue:#123d5c;--line:#c7d0d9;--muted:#536273}*{box-sizing:border-box}body{margin:0;background:#eef3f7;color:#111;font-family:Aptos,Calibri,Arial,sans-serif}.toolbar{position:sticky;top:0;display:flex;gap:8px;justify-content:center;padding:12px;background:var(--navy);z-index:5}.toolbar button,.toolbar a{border:1px solid #42d7ff;border-radius:10px;background:#123149;color:#fff;padding:10px 14px;text-decoration:none;cursor:pointer}.paper{width:min(8.5in,calc(100vw - 24px));margin:20px auto;background:#fff;padding:.55in;box-shadow:0 14px 40px rgba(0,0,0,.18)}.mast{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;border-bottom:4px solid var(--blue);padding-bottom:12px}.mast img{width:74px}.eyebrow{font-size:9pt;text-transform:uppercase;letter-spacing:.09em;color:var(--blue);font-weight:800}h1{font-size:23pt;line-height:1.05;margin:4px 0;color:var(--navy)}h2{font-size:13pt;color:var(--navy);border-bottom:1px solid var(--line);padding-bottom:4px;margin:16px 0 7px}.meta,.decision-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px}.decision-grid{grid-template-columns:repeat(4,1fr);margin:12px 0}.box{border:1px solid var(--line);padding:8px;page-break-inside:avoid}.box strong{display:block;color:var(--blue);font-size:8pt;text-transform:uppercase}.big{font-size:13pt;font-weight:800}.warning{border-left:5px solid #a65d00;background:#fff7e6;padding:10px}.critical{border-left:5px solid #9b1c1c;background:#fff0f0;padding:10px}table{width:100%;border-collapse:collapse;font-size:8.5pt;page-break-inside:auto}tr{page-break-inside:avoid}th,td{border:1px solid var(--line);padding:5px;text-align:left;vertical-align:top}th{background:#e8f4fb;color:var(--navy)}p,li{font-size:10pt;line-height:1.35}.signature{border:1px solid var(--line);padding:10px;page-break-inside:avoid}.line{height:30px;border-bottom:1px solid #111;margin:6px 0}.footer{font-size:8pt;color:var(--muted);margin-top:12px;border-top:1px solid var(--line);padding-top:7px}textarea{width:100%;min-height:160px}@media(max-width:800px){.decision-grid,.meta{grid-template-columns:1fr}.paper{padding:20px}.mast{flex-direction:column}}@page{size:Letter;margin:.45in}@media print{body{background:#fff}.toolbar{display:none}.paper{width:auto;margin:0;padding:0;box-shadow:none}h2{break-after:avoid}.signature,.box{break-inside:avoid}}
</style></head><body><div class="toolbar"><a href="vendor-risk-next.html">Preferred Demo</a><button id="load">Load Demo Record</button><button onclick="window.print()">Print / Save PDF</button><button id="download">Download JSON</button></div><main class="paper" id="report"><p>Loading canonical AI Trust Decision Record…</p></main><script type="module">
import { analyzeRecommendation } from './src/atdr/atdr-engine.js';import { VENDOR_RISK_CONTRADICTORY_DEMO } from './src/atdr/atdr-demo-data.js';import { CRM_SHEET_ID, REPORT_CAPTURE_MODE } from './src/atdr/report-capture-config.js';import { buildTrustDecisionRecord, validateTrustDecisionRecordShape } from './src/atdr/trust-decision-record-schema-mapper.js';
const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const validators=[['SOC 2 scope','Needs Evidence','The evaluated AI service must be in scope.'],['Encryption proof','Needs Evidence','Vendor assertion is not independent proof.'],['Framework mapping','Fail','Mapping is not compliance proof.'],['Data-use terms','Needs Evidence','Derived-use language requires review.'],['Subprocessors','Needs Evidence','Downstream AI providers must be known.'],['Incident notification','Needs Evidence','No fixed timeline is stated.'],['Human approval','Fail','Accountable human approval is missing.']].map((v,i)=>({validator_id:`VR-${i+1}`,validator_name:v[0],status:v[1],explanation:v[2]}));
const actions=[['Approve',false,'Material gaps remain.'],['Accept with Caveat',false,'Caveats remain material.'],['Escalate for Review',false,'Review is required but does not supply evidence.'],['Request Evidence',true,'Strongest defensible next action.'],['Reject',false,'Evidence is insufficient for final rejection.']].map((a,i)=>({candidate_action_id:`CA-${i+1}`,action_label:a[0],selected_as_recommendation:a[1],rationale:a[2]}));
function enhanceReport(t){if(!document.querySelector('#report-print-polish'))document.head.insertAdjacentHTML('beforeend',`<style id="report-print-polish">.first-page-actions{display:grid;grid-template-columns:1fr 2fr;gap:8px;margin:10px 0}.compact-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.section-note{border-left:4px solid var(--blue);padding:7px 9px;background:#f4f8fb}thead{display:table-header-group}@media print{.meta{grid-template-columns:1fr 1fr!important;gap:3px 16px}.meta p{margin:3px 0}.decision-grid{grid-template-columns:repeat(4,1fr)!important;gap:6px}.decision-grid .box{padding:6px}.decision-grid .big{font-size:11pt}.first-page-actions{grid-template-columns:1fr 2fr}.compact-grid{grid-template-columns:repeat(2,1fr)}thead{display:table-header-group}tfoot{display:table-footer-group}tr{break-inside:avoid;page-break-inside:avoid}.section-note{break-inside:avoid}}</style>`);const critical=document.querySelector('#report .critical');critical?.insertAdjacentHTML('afterend',`<section class="first-page-actions"><div class="box"><strong>Decision Owner</strong><span>${esc(t.decision_owner)}</span></div><div class="box"><strong>Next Human Action</strong><span>Collect required evidence, assign reviewers, then approve, reject, defer, or override with documented residual-risk rationale.</span></div></section>`);const agency=[...document.querySelectorAll('#report h2')].find(h=>h.textContent==='Human Agency and Next Action');agency?.insertAdjacentHTML('beforebegin',`<section><h2>Human Legibility and Meaningful Human Authority</h2><div class="compact-grid"><div class="box"><strong>Facts</strong><span>The AI recommended vendor approval; ${t.claims.length} reviewable claims and ${t.evidence_items.length} synthetic evidence items are recorded.</span></div><div class="box"><strong>Assumptions</strong><span>SOC 2 existence and encryption claims are insufficient without evaluated-service scope and implementation evidence.</span></div><div class="box"><strong>CyberShield Inference</strong><span>${esc(t.record_defensibility_band)}.</span></div><div class="box"><strong>Recommendation</strong><span>${esc(t.cyberShield_recommended_action)} before vendor approval.</span></div></div><p class="section-note"><strong>Challenge-Tested:</strong> Reviewed by ${t.validator_results.length} deterministic validators and candidate-action comparison. The accountable reviewer can inspect evidence, challenge the recommendation, reject it, and document an override or residual-risk decision.</p><h2>Harness Health Assessment</h2><table><thead><tr><th>Check</th><th>Status</th><th>Finding</th></tr></thead><tbody><tr><td>Inputs / Sources</td><td>Needs Evidence</td><td>Evidence is synthetic and includes missing, self-attested, or scope-limited support.</td></tr><tr><td>Reach / Permissions</td><td>Constrained</td><td>CyberShield advises; it does not approve vendors or change external systems.</td></tr><tr><td>Job / Purpose</td><td>Clear</td><td>The bounded job is vendor-risk Decision Assurance.</td></tr><tr><td>Proof / Evidence</td><td>Needs Evidence</td><td>Claims, gaps, contradictions, and validator findings remain visible.</td></tr><tr><td>Value / Usefulness</td><td>Useful with Limits</td><td>The record supports human review without claiming live verification or production readiness.</td></tr></tbody></table><p class="section-note"><strong>Harness recommendation:</strong> Improve evidence completeness, constrain authority, and keep maintenance human-governed.</p></section>`)}
function renderReport(t){render(t);enhanceReport(t)}
function make(){const evidence=VENDOR_RISK_CONTRADICTORY_DEMO.evidence_repository;const rec='AI recommends approving Vendor X because they have a SOC 2 report, encrypt customer data, and appear low risk.';const engine=analyzeRecommendation({recommendation:rec,domain:'vendor-risk',evidence:evidence.map(e=>`[${e.evidence_name}] ${e.text_extract}`).join('\n'),aiSource:'User-pasted AI recommendation',sourceModel:'Unknown',intendedUse:'Vendor approval recommendation review before enterprise action',context:VENDOR_RISK_CONTRADICTORY_DEMO.decision_context,decisionOwner:'Pending vendor-risk owner assignment',createdBy:'CyberShield demo'});return buildTrustDecisionRecord({engineRecord:engine,state:{company:'Demo Organization',vendor:'Vendor X',recommendation:rec,contradiction:'all'},evidenceItems:evidence,validators,candidateActions:actions,reportAction:'executive_report',captureConfig:{CRM_SHEET_ID,REPORT_CAPTURE_MODE}})}
function render(t){const valid=validateTrustDecisionRecordShape(t);document.querySelector('#report').innerHTML=`<section class="mast"><div><div class="eyebrow">CyberShield by Maximum Justice Cybersecurity</div><h1>AI Trust Decision Record</h1><p><strong>${esc(t.decision_title)}</strong></p></div><img src="assets/mjc-logo-2026.png" alt="MJC logo"></section><section class="meta"><p><strong>Prepared for:</strong> ${esc(t.company_or_organization)}</p><p><strong>Vendor:</strong> ${esc(t.vendor_name)}</p><p><strong>Report ID:</strong> ${esc(t.report_id)}</p><p><strong>Record ID:</strong> ${esc(t.record_id)}</p><p><strong>Created:</strong> ${esc(t.created_timestamp)}</p><p><strong>Schema validation:</strong> ${valid.ok?'PASS':'CHECK '+valid.missing.join(', ')}</p></section><section class="decision-grid"><div class="box"><strong>Decision Readiness</strong><span class="big">Not Defensible Yet</span></div><div class="box"><strong>Strongest Action</strong><span class="big">${esc(t.cyberShield_recommended_action)}</span></div><div class="box"><strong>Risk If Wrong</strong><span class="big">${esc(t.risk_if_wrong_band)}</span></div><div class="box"><strong>Confidence</strong><span class="big">${esc(t.confidence_band)}</span></div></section><p class="critical"><strong>Human Review Required:</strong> Yes. Required roles: ${t.required_reviewer_roles.map(esc).join(', ')}.</p><h2>Executive Decision Brief</h2><p>The AI recommendation is polished but not evidence-sufficient. SOC 2 existence and encryption claims do not prove evaluated-service scope, data-use restrictions, complete subprocessor disclosure, incident-notification commitments, or accountable approval. Request Evidence is the strongest defensible next action.</p><h2>Recommendation Under Review</h2><p>${esc(t.original_ai_recommendation)}</p><h2>Material Claims</h2><table><thead><tr><th>ID</th><th>Claim</th><th>Materiality</th><th>Conflict</th></tr></thead><tbody>${t.claims.slice(0,10).map(c=>`<tr><td>${esc(c.claim_id)}</td><td>${esc(c.normalized_claim)}</td><td>${esc(c.materiality)}</td><td>${esc(c.conflict_status)}</td></tr>`).join('')}</tbody></table><h2>Validator Results</h2><table><thead><tr><th>Validator</th><th>Status</th><th>Explanation</th></tr></thead><tbody>${t.validator_results.map(v=>`<tr><td>${esc(v.validator_name)}</td><td>${esc(v.status)}</td><td>${esc(v.explanation)}</td></tr>`).join('')}</tbody></table><h2>Candidate Action Comparison</h2><table><thead><tr><th>Action</th><th>Selected</th><th>Rationale</th></tr></thead><tbody>${t.candidate_actions.map(a=>`<tr><td>${esc(a.action_label)}</td><td>${a.selected_as_recommendation?'Yes':'No'}</td><td>${esc(a.rationale)}</td></tr>`).join('')}</tbody></table><h2>Human Agency and Next Action</h2><p class="warning">The accountable human reviewer must inspect evidence, challenge the AI recommendation, request missing support, and document approval, rejection, deferral, or override with residual-risk rationale.</p><h2>Limitations</h2><ul>${t.limitations.map(l=>`<li>${esc(l)}</li>`).join('')}</ul><section class="signature"><h2>Reviewer and Signature Block</h2><p><strong>Dr. Max Justice</strong><br>vCISO | Security SME | Cybersecurity SME<br>CISSP | PMP | PhD, Technology & Innovation Management – Cybersecurity<br>Maximum Justice Cybersecurity</p><p>Signature:</p><div class="line"></div><p>Date:</p><div class="line"></div><p>Decision: ☐ Approve ☐ Approve with Caveat ☐ Request Evidence ☐ Escalate ☐ Reject</p></section><p class="footer">Prepared by CyberShield. Static advisory prototype. Browser Print / Save PDF is the current export path. Google Sheet capture is prototype-grade and requires row verification.</p>`;window.__CYBERSHIELD_CANONICAL_RECORD__=t}
const record=make();renderReport(record);document.querySelector('#load').onclick=()=>renderReport(make());document.querySelector('#download').onclick=()=>{const t=window.__CYBERSHIELD_CANONICAL_RECORD__;const blob=new Blob([JSON.stringify(t,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`cybershield-ai-trust-decision-record-${Date.now()}.json`;a.click();URL.revokeObjectURL(url)};
</script></body></html>
