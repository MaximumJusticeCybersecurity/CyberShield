<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CyberShield Vendor-Risk Decision Loop</title>
<link rel="icon" href="assets/mjc-logo-2026.png">
<style>
:root{--bg:#07131f;--panel:#101923;--line:#2d4358;--text:#f7fbff;--muted:#b9c7d6;--blue:#42d7ff;--amber:#ffd166;--red:#ff7474;--green:#77e1a1;--shadow:0 18px 46px rgba(0,0,0,.35)}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#06111c,#0a1724 48%,#07131f);color:var(--text);font-family:Aptos,Calibri,Inter,Arial,sans-serif;line-height:1.45}button,input,select{font:inherit}button{border:1px solid var(--line);border-radius:12px;padding:10px 14px;background:#132232;color:var(--text);cursor:pointer}button:hover{border-color:var(--blue)}button.primary{background:linear-gradient(180deg,rgba(66,215,255,.24),rgba(20,43,61,.95));border-color:var(--blue)}input,select{width:100%;background:#08131f;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:11px}.topbar{position:sticky;top:0;z-index:20;display:flex;gap:16px;align-items:center;justify-content:space-between;padding:13px 20px;background:rgba(7,19,31,.97);border-bottom:1px solid var(--line);box-shadow:0 8px 24px rgba(0,0,0,.24)}.brand{display:flex;gap:12px;align-items:center}.brand img{width:46px;height:46px;object-fit:contain}.eyebrow,.chip,.label{color:var(--blue);font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;font-weight:800}.brand strong{display:block}.layout{width:min(1260px,calc(100vw - 28px));margin:0 auto;padding:22px 0 48px;display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:16px}.panel,.brief-card,.side{background:linear-gradient(180deg,rgba(18,31,44,.98),rgba(11,22,34,.99));border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}.panel{padding:22px}.side{position:sticky;top:86px;align-self:start;padding:18px}.brief-card{padding:14px;margin:10px 0;background:rgba(255,255,255,.045)}h1,h2,h3{margin:.2rem 0 .8rem;line-height:1.12}p{color:var(--muted)}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:13px}.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}.stepper{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:12px 0 18px}.step{border:1px solid var(--line);border-radius:12px;padding:10px;background:rgba(255,255,255,.04);color:var(--muted);font-size:.9rem}.step.active{border-color:var(--blue);color:var(--text);background:rgba(66,215,255,.12)}.tag{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:4px 8px;margin:2px;color:var(--muted);font-size:.82rem}.tag.warn{border-color:rgba(255,209,102,.6);color:var(--amber)}.tag.bad{border-color:rgba(255,116,116,.6);color:var(--red)}.tag.good{border-color:rgba(119,225,161,.6);color:var(--green)}.metric{font-size:1.45rem;font-weight:900}.warn{color:var(--amber)}.bad{color:var(--red)}.good{color:var(--green)}table{width:100%;border-collapse:collapse;min-width:720px}th,td{padding:10px;border-bottom:1px solid rgba(185,199,214,.16);vertical-align:top;text-align:left}th{color:#8eeaff;background:#0a1826;font-size:.8rem;text-transform:uppercase;letter-spacing:.06em}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:14px}.callout{border-left:5px solid var(--amber);background:rgba(255,209,102,.08);padding:12px 14px;border-radius:12px;color:var(--muted)}pre{white-space:pre-wrap;max-height:260px;overflow:auto;background:#07111c;border:1px solid var(--line);border-radius:12px;padding:12px;color:#dff6ff}.hidden{display:none!important}@media(max-width:960px){.layout{grid-template-columns:1fr}.side{position:static}.grid2,.grid3,.stepper{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}}@media print{.topbar,.side,.actions,.stepper{display:none!important}body{background:#fff;color:#111}.layout{display:block;width:auto;padding:0}.panel{box-shadow:none;border:0;color:#111;background:#fff}.panel p,.panel td{color:#111}.brief-card{border:1px solid #ccc;box-shadow:none;background:#fff}.tag{color:#111}.print-only{display:block!important}}
</style>
</head>
<body>
<header class="topbar"><div class="brand"><img src="assets/mjc-logo-2026.png" alt="MJC logo"><span><span class="eyebrow">CyberShield Guided Demo</span><strong>Vendor-Risk Trust Decision Loop</strong></span></div><div class="actions"><a href="atdr.html"><button type="button">Open Workbench</button></a><button id="printTop" type="button">Print / Save PDF</button></div></header>
<main class="layout"><section class="panel" id="app"></section><aside class="side" id="side"></aside></main>
<script type="module" src="src/atdr/vendor-risk-guided.js"></script>
</body>
</html>
